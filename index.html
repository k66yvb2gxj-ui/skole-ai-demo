<!DOCTYPE html>
<html lang="no"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Skole-AI</title>
<style>
:root{--purple:#5b5fc7;--purple-d:#4b50b8;--bg:#f0f0f4;--panel:#fff;--ink:#242424;--mut:#616161;--line:#e1e1e6;--good:#0e700e;--warn:#bc4b09;--bad:#c50f1f}
*{box-sizing:border-box}
body{margin:0;font-family:'Segoe UI',-apple-system,Roboto,sans-serif;background:var(--bg);color:var(--ink);font-size:15px}
.app{display:none}.app.on{display:flex;min-height:100vh}
/* ---- Landing / fag-meny ---- */
#landing{max-width:1000px;margin:0 auto;padding:40px 24px}
#landing.off{display:none}
.brand{display:flex;align-items:center;gap:12px;margin-bottom:6px}
.logo{width:40px;height:40px;border-radius:9px;background:var(--purple);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:20px}
h1{font-size:26px;margin:0}
.tag{color:var(--mut);margin:4px 0 28px}
.group{margin:22px 0 8px;font-size:13px;font-weight:600;color:var(--mut);text-transform:uppercase;letter-spacing:.4px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:14px}
.card{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:16px;cursor:pointer;transition:.12s;border-top:4px solid var(--purple)}
.card:hover{box-shadow:0 6px 20px rgba(0,0,0,.10);transform:translateY(-2px)}
.card .nm{font-weight:600;font-size:17px}
.card .meta{color:var(--mut);font-size:13px;margin-top:3px}
.card .badge{display:inline-block;font-size:11px;font-weight:600;color:#fff;border-radius:5px;padding:1px 7px;margin-top:10px}
.card .cnt{float:right;color:var(--mut);font-size:13px}
/* ---- Workspace ---- */
.rail{width:230px;background:var(--panel);border-right:1px solid var(--line);padding:16px 12px;flex-shrink:0}
.back{display:flex;align-items:center;gap:6px;color:var(--mut);cursor:pointer;font-size:13px;margin-bottom:16px}
.back:hover{color:var(--ink)}
.subj{font-weight:600;font-size:17px;margin-bottom:2px}
.subj-meta{color:var(--mut);font-size:13px;margin-bottom:18px}
.nav{display:flex;flex-direction:column;gap:2px}
.nav .item{padding:9px 12px;border-radius:7px;cursor:pointer;color:var(--mut);font-size:14px;display:flex;align-items:center;gap:9px}
.nav .item:hover{background:var(--bg)}
.nav .item.on{background:var(--purple);color:#fff;font-weight:600}
.main{flex:1;padding:26px 30px;max-width:900px}
.h2{font-size:20px;margin:0 0 4px}
.sub{color:var(--mut);font-size:14px;margin-bottom:18px}
.panel{display:none}.panel.on{display:block}
.term{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:16px;margin:12px 0}
.term h3{margin:0 0 2px;font-size:15px}.term .tm{color:var(--mut);font-size:13px;margin-bottom:10px}
.goal{padding:10px 12px;border-left:3px solid var(--purple);background:#fafafe;border-radius:7px;margin:8px 0}
.goal .code{color:var(--purple);font-weight:600;font-size:12px}
.goal .pre{color:var(--mut);font-size:12px;margin-top:4px}
.vurd{color:var(--good);font-size:13px;margin-top:8px}
.chip{display:inline-block;font-size:11px;color:var(--mut);border:1px solid var(--line);border-radius:5px;padding:1px 7px;margin-left:6px}
table{width:100%;border-collapse:collapse;font-size:13px;background:var(--panel);border-radius:10px;overflow:hidden}
th,td{text-align:left;padding:8px 11px;border-bottom:1px solid var(--line);vertical-align:top}
th{color:var(--mut);font-weight:600;font-size:12px;background:#fafafa}
.wk{color:var(--purple);font-weight:600;white-space:nowrap}.vrow td{color:var(--good)}
textarea{width:100%;min-height:110px;background:#fff;color:var(--ink);border:1px solid var(--line);border-radius:9px;padding:11px;font:14px/1.5 inherit}
button{background:var(--purple);color:#fff;border:0;border-radius:8px;padding:9px 16px;font-weight:600;cursor:pointer;font-size:14px}
button:hover{background:var(--purple-d)}
.mis{background:var(--panel);border:1px solid var(--line);border-left:3px solid var(--warn);border-radius:9px;padding:11px;margin:8px 0}
.mis .pct{color:var(--warn);font-weight:700}.tiltak{color:var(--good);font-size:13px;margin-top:5px}
.note{background:#eff6fc;border:1px solid #c7e0f4;border-radius:9px;padding:12px;margin-top:12px;color:#1b3a57;font-size:14px}
.callout{background:#fff8f0;border:1px solid #f3d9b8;border-radius:9px;padding:14px;color:#5a3a12;font-size:14px}
.chat{background:#fff;border:1px solid var(--line);border-radius:11px;padding:12px;min-height:120px;margin-bottom:10px}
.msg{margin:8px 0;padding:9px 12px;border-radius:9px;max-width:88%;font-size:14px}
.me{background:var(--purple);color:#fff;margin-left:auto}.ai{background:var(--bg);border:1px solid var(--line)}
.ai.ok{border-left:3px solid var(--good)}.ai.warn{border-left:3px solid var(--warn)}.ai.stop{border-left:3px solid var(--bad)}
.ai .vd{font-weight:700;margin-bottom:3px}
.ex{font-size:13px;color:var(--mut);margin:6px 0}.ex b{color:var(--purple);cursor:pointer}
.pill{font-size:12px;color:var(--mut)}
</style></head><body>

  h+=`<div class="term"><h3>${p.termin}</h3><div class="tm">${p.uker_innhold} uker fagstoff + ${p.uker_vurdering} vurdering</div>`;
  for(const m of p.maal){const st=m.strand?`<span class="chip">${SN[m.strand]||m.strand}</span>`:"";const pre=m.forkunnskap?`<div class="pre">↳ ${m.forkunnskap}</div>`:"";
   h+=`<div class="goal"><span class="code">${m.kode}</span>${st} · ${m.uker} uker<div>${m.tekst}</div>${pre}</div>`;}
  h+=`<div class="vurd">✓ Underveisvurdering</div></div>`;}
 h+=`</div>`;
 // uke
 h+=`<div class="panel" id="p-uke"><div class="h2">Ukeplan</div><div class="sub">Uke for uke — klar til å dele med elever/foreldre.</div><table><tr><th>Uke</th><th>Tema</th><th>Kompetansemål</th></tr>`;
 for(const w of s.weeks){if(w.type==='vurd')h+=`<tr class="vrow"><td class="wk">Uke ${w.uke}</td><td>Vurdering / repetisjon</td><td>${w.termin||''}</td></tr>`;
  else h+=`<tr><td class="wk">Uke ${w.uke}</td><td>${w.strand?SN[w.strand]:'fagstoff'} ${w.del?`<span class="pill">(${w.del})</span>`:''}</td><td>${w.kode}: ${w.tekst.slice(0,64)}...</td></tr>`;}
 h+=`</table></div>`;
 // mal
 h+=`<div class="panel" id="p-mal"><div class="h2">Kompetansemål (${s.sett})</div><div class="sub">LK20, hentet fra Udir. Bokmål vist; nynorsk finnes også.</div>`;
 for(const g of s.goals)h+=`<div class="goal"><span class="code">${g.kode}</span> ${g.kjerne.length?`<span class="chip">${g.kjerne[0]}</span>`:''}<div>${g.tekst}</div></div>`;
 h+=`</div>`;
 // loop + chat (kun engine)
 if(s.engine){
  h+=`<div class="panel" id="p-loop"><div class="h2">Lukket sløyfe</div><div class="sub">Lim inn <b>anonyme</b> svar (ett per linje). AI gjør tolkningen.</div>
   <textarea id="answers">den deriverte i punktet er bare y-verdien til f(x)
jeg regnet gjennomsnitt mellom de to punktene
f'(2) = f(2) = 5
stigningstall mellom a og b
tangentens stigningstall, brukte grenseverdi av h
den momentane vekstfarten som grense naar h gaar mot 0</textarea>
   <div style="margin-top:10px"><button onclick="runLoop()">Analyser klassen → foreslå justering</button></div>
   <div id="loopOut" style="margin-top:14px"></div></div>`;
  h+=`<div class="panel" id="p-chat"><div class="h2">Endre planen</div><div class="sub">Skriv hva du vil endre. AI sjekker mot forkunnskaps-grafen — <b>du bestemmer</b>.</div>
   <div class="ex">Prøv: <b onclick="ex(this)">Kan jeg ta derivasjon foer grenseverdi?</b> · <b onclick="ex(this)">Vi ligger bak paa vektorer</b> · <b onclick="ex(this)">Mer tid paa logaritmer</b></div>
   <div class="chat" id="chatlog"></div>
   <textarea id="chatin" style="min-height:60px" placeholder="F.eks. Kan jeg ta vektorer helt til slutt?"></textarea>
   <div style="margin-top:8px"><button onclick="sendChat()">Send</button></div></div>`;
 }
 document.getElementById('wsMain').innerHTML=h;
}

/* ---- loop ---- */
function analyze(goal,answers){const pats=DB.tax[goal]||[],n=answers.length,hits={};pats.forEach(p=>hits[p.id]=0);
 for(const a of answers){const low=a.toLowerCase();for(const p of pats)if(p.nokkelord.some(k=>low.includes(k.toLowerCase())))hits[p.id]++;}
 const funn=pats.filter(p=>hits[p.id]>0).map(p=>({id:p.id,beskrivelse:p.beskrivelse,antall:hits[p.id],andel:Math.round(hits[p.id]/n*100),tiltak:p.tiltak})).sort((a,b)=>b.antall-a.antall);
 const feil=Object.values(hits).reduce((a,b)=>a+b,0);return{n,funn,mestring:Math.round(Math.max(0,1-feil/n)*100)};}
function runLoop(){const a=document.getElementById('answers').value.split('\n').map(s=>s.trim()).filter(Boolean);const r=analyze('KM3119',a);
 let h=`<div class="term"><h3>Innsikt — KM3119 (derivert i punkt)</h3><div class="tm">${r.n} anonyme svar · estimert mestring <b>${r.mestring}%</b></div>`;
 if(!r.funn.length)h+=`<div class="vurd">Ingen tydelig misforståelse.</div></div>`;
 else{for(const f of r.funn)h+=`<div class="mis"><span class="pct">${f.andel}%</span> (${f.antall}/${r.n}) — ${f.beskrivelse}<div class="tiltak">↳ ${f.tiltak}</div></div>`;
  const t=r.funn[0];h+=`<div class="note"><b>Forslag (lærer godkjenner):</b> Klassen ligger ~1 uke bak på <b>KM3119</b> pga "${t.id}". Legg inn målrettet øvingsuke i Termin 1b; nedstrøms mål forskyves.</div></div>`;}
 document.getElementById('loopOut').innerHTML=h;}

/* ---- chat ---- */
const THEME={potens:["KM3098"],logaritm:["KM3098"],vektor:["KM3112"],parameter:["KM3115"],grenseverd:["KM3117"],kontinu:["KM3118"],derivasjon:["KM3119","KM3110","KM3111"],derivert:["KM3119","KM3110","KM3111"],omvendt:["KM3116"],vekst:["KM3109"],modeller:["KM3109","KM3114","KM3113"]};
function nodes(){return DB.preq.nodes;}function seq(){return DB.preq.suggested_sequence;}
function revDeps(c){return seq().filter(x=>(nodes()[x].bygger_paa_R1||[]).includes(c));}
function findGoals(t){const s=new Set();for(const k in THEME)if(t.includes(k))THEME[k].forEach(c=>s.add(c));return[...s];}
function gname(c){const g=(DB.subjects['Matematikk R1'].goals.find(x=>x.kode===c)||{}).tekst||c;return g.slice(0,40)+"...";}
function advise(txt){const t=txt.toLowerCase();const gs=findGoals(t);
 const earlier=/(tidlig|foer|forst|fremover)/.test(t),later=/(senere|etter|sist|bak|slutt)/.test(t),behind=/(ligger bak|sliter|henger|bak paa)/.test(t),more=/(mer tid|legg til|flere uker|lengre|ekstra)/.test(t);
 if(!gs.length)return{cls:"",vd:"Hmm",b:"Hvilket tema mener du? Prøv derivasjon, vektorer, grenseverdi, logaritmer eller modellering."};
 if(behind){const g=gs[0];return{cls:"ok",vd:"Lurt — målrettet øving",b:`Du ligger bak på <b>${g}</b> (${gname(g)}). Legg inn en kort øvingsøkt på akkurat det elevene bommer på, og skyv nedstrøms én uke. Vil du at jeg lager øvingsoppgavene?`};}
 if(more){const g=gs[0],rev=revDeps(g);return{cls:"ok",vd:"Greit",b:`Mer tid på <b>${g}</b> er uproblematisk.${rev.length?` Merk: ${rev.join(", ")} bygger på dette og forskyves.`:""} Du bestemmer.`};}
 if(earlier&&!later){for(const g of gs){const req=nodes()[g].bygger_paa_R1||[];if(req.length)return{cls:"stop",vd:"Pass på — bryter en forutsetning",b:`<b>${g}</b> (${gname(g)}) bygger på ${req.join(", ")}. Tar du det tidligere, mangler elevene grunnlaget. Behold rekkefølgen, eller flytt forutsetningene foran. Du bestemmer.`};}return{cls:"warn",vd:"Mulig, men sjekk",b:`<b>${gs[0]}</b> har ingen R1-forutsetninger. Pass på at temaer som bygger på det (${revDeps(gs[0]).join(", ")||"ingen"}) fortsatt kommer etter.`};}
 if(later){for(const g of gs){const rev=revDeps(g);if(rev.length)return{cls:"warn",vd:"Mulig, men noe må flyttes med",b:`<b>${g}</b> er forutsetning for ${rev.join(", ")}. Flyttes det senere, må de også flyttes bakover.`};}return{cls:"ok",vd:"Greit",b:`<b>${gs[0]}</b> er ikke forutsetning for andre R1-mål, så det kan trygt flyttes senere.`};}
 return{cls:"",vd:"Si litt mer",b:`Vil du flytte <b>${gs[0]}</b>, bruke mer tid, eller melde at klassen ligger bak?`};}
function push(h){const l=document.getElementById('chatlog');l.innerHTML+=h;l.scrollTop=l.scrollHeight;}
function sendChat(){const i=document.getElementById('chatin');const v=i.value.trim();if(!v)return;push(`<div class="msg me">${v}</div>`);i.value="";const a=advise(v);push(`<div class="msg ai ${a.cls}"><div class="vd">${a.vd}</div>${a.b}</div>`);}
function ex(el){document.getElementById('chatin').value=el.textContent;sendChat();}

renderMenu();
</script></body></html>
