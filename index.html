<!DOCTYPE html>
<html lang="no"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>Skole-AI</title><style>
:root{--purple:#5b5fc7;--purple-d:#4b50b8;--purple-soft:#eef0fb;--bg:#f5f5f8;--panel:#fff;--ink:#1f1f23;--mut:#5e5e6b;--line:#e6e6ec;--line-strong:#d4d4dd;--good:#0e700e;--warn:#bc4b09;--bad:#c50f1f;--sh-sm:0 1px 2px rgba(20,20,40,.06),0 1px 3px rgba(20,20,40,.05);--sh-md:0 2px 8px rgba(20,20,40,.07),0 8px 24px rgba(20,20,40,.06);--sh-lg:0 8px 28px rgba(20,20,40,.12)}
*{box-sizing:border-box}body{margin:0;font-family:'Segoe UI',-apple-system,Roboto,sans-serif;background:var(--bg);color:var(--ink);font-size:15px;-webkit-font-smoothing:antialiased}
.app{display:none}.app.on{display:flex;min-height:100vh}
#landing{max-width:1040px;margin:0 auto;padding:48px 24px}#landing.off{display:none}
.brand{display:flex;align-items:center;gap:13px;margin-bottom:6px}
.logo{width:44px;height:44px;border-radius:12px;background:linear-gradient(135deg,var(--purple),#7a7ed6);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:22px;box-shadow:var(--sh-sm)}
h1{font-size:27px;margin:0;letter-spacing:-.3px}.tag{color:var(--mut);margin:6px 0 32px}
.group{margin:26px 0 12px;font-size:12px;font-weight:700;color:var(--mut);text-transform:uppercase;letter-spacing:.7px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:16px}
.card{background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:18px;cursor:pointer;transition:transform .14s,box-shadow .14s,border-color .14s;border-top:4px solid var(--purple);box-shadow:var(--sh-sm)}
.card:hover{box-shadow:var(--sh-lg);transform:translateY(-3px);border-color:var(--line-strong)}
.card .nm{font-weight:700;font-size:18px;letter-spacing:-.2px}.card .meta{color:var(--mut);font-size:13px;margin-top:3px}
.card .badge{display:inline-block;font-size:11px;font-weight:600;color:#fff;border-radius:6px;padding:2px 9px;margin-top:12px}
.card .cnt{float:right;color:var(--mut);font-size:12px;font-weight:600;background:var(--bg);border-radius:20px;padding:2px 9px}
.rail{width:236px;background:var(--panel);border-right:1px solid var(--line);padding:18px 14px;flex-shrink:0;box-shadow:var(--sh-sm)}
.back{display:inline-flex;align-items:center;gap:6px;color:var(--mut);cursor:pointer;font-size:13px;font-weight:600;margin-bottom:18px;padding:6px 10px;border-radius:8px;transition:.12s}.back:hover{color:var(--ink);background:var(--bg)}
.subj{font-weight:700;font-size:18px;margin-bottom:2px;letter-spacing:-.2px}.subj-meta{color:var(--mut);font-size:13px;margin-bottom:20px}
.nav{display:flex;flex-direction:column;gap:3px}
.nav .item{padding:10px 13px;border-radius:9px;cursor:pointer;color:var(--mut);font-size:14px;font-weight:500;transition:.12s}
.nav .item:hover{background:var(--bg);color:var(--ink)}.nav .item.on{background:var(--purple);color:#fff;font-weight:600;box-shadow:var(--sh-sm)}
.main{flex:1;padding:30px 34px;max-width:880px}
.h2{font-size:21px;margin:0 0 5px;letter-spacing:-.3px}.sub{color:var(--mut);font-size:14px;margin-bottom:22px;line-height:1.55}
.panel{display:none}.panel.on{display:block}
.term{background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:20px;margin:16px 0;box-shadow:var(--sh-sm)}
.term h3{margin:0 0 2px;font-size:15px;font-weight:700}.term .tm{color:var(--mut);font-size:13px;margin-bottom:14px}
.goal{padding:13px 15px;border:1px solid var(--line);border-left:4px solid var(--purple);background:var(--panel);border-radius:11px;margin:10px 0;transition:.12s}
.goal:hover{box-shadow:var(--sh-sm);border-color:var(--line-strong)}
.goal .code{color:var(--purple);font-weight:700;font-size:12px;letter-spacing:.3px}.goal .pre{color:var(--mut);font-size:12px;margin-top:6px}
.vurd{color:var(--good);font-size:13px;font-weight:600;margin-top:14px;padding-top:12px;border-top:1px solid var(--line)}
.chip{display:inline-block;font-size:11px;color:var(--mut);background:var(--bg);border:1px solid var(--line);border-radius:20px;padding:2px 10px;margin-left:7px;font-weight:500}
/* Kollapsbar termin/uke-tre */
.planbar{display:flex;gap:8px;margin:4px 0 14px}
.mini{background:var(--panel);color:var(--mut);border:1px solid var(--line-strong);border-radius:8px;padding:6px 12px;font-size:12.5px;font-weight:600;cursor:pointer;box-shadow:none}
.mini:hover{background:var(--bg);color:var(--ink);border-color:var(--purple);box-shadow:none}.mini:active{transform:none}
.tree{display:flex;flex-direction:column;gap:10px}
.term-node{background:var(--panel);border:1px solid var(--line);border-radius:14px;box-shadow:var(--sh-sm);overflow:hidden}
.term-head{display:flex;align-items:center;gap:10px;padding:15px 18px;cursor:pointer;user-select:none;transition:background .12s}
.term-head:hover{background:var(--bg)}
.term-title{font-weight:700;font-size:15px;color:var(--ink)}
.term-meta{margin-left:auto;color:var(--mut);font-size:12.5px;white-space:nowrap}
.term-body{display:none;padding:4px 14px 14px;flex-direction:column;gap:7px}
.term-node.open .term-body{display:flex}
.tw{width:9px;height:9px;border-right:2px solid var(--mut);border-bottom:2px solid var(--mut);transform:rotate(-45deg);transition:transform .15s;flex-shrink:0;margin-right:2px;margin-top:-3px}
.term-node.open>.term-head .tw{transform:rotate(45deg);margin-top:-6px}
.wk-node{border:1px solid var(--line);border-radius:10px;background:var(--bg);overflow:hidden}
.wk-head{display:flex;align-items:center;gap:10px;padding:10px 13px;cursor:pointer;user-select:none;transition:background .12s}
.wk-head:hover{background:#eef0fb}
.wk-head.wk-static{cursor:default}.wk-head.wk-static:hover{background:transparent}
.wk-no{font-weight:700;color:var(--purple);font-size:13px;white-space:nowrap}
.wk-tag{font-size:12.5px;color:var(--ink)}
.vurd-tag{color:var(--good);font-weight:600}
.vurd-node{background:#f6fbf6;border-color:#dceadc}
.wk-code{margin-left:auto;font-size:11px;font-weight:700;color:var(--mut);letter-spacing:.3px;background:var(--panel);border:1px solid var(--line);border-radius:6px;padding:1px 7px}
.wk-body{display:none;padding:0 14px 13px 32px;flex-direction:column;gap:6px}
.wk-node.open .wk-body{display:flex}
.wk-node.open>.wk-head .tw{transform:rotate(45deg);margin-top:-6px}
.wk-body .wk-goal{font-size:13.5px;line-height:1.5;color:var(--ink)}
.wk-body .pre{color:var(--mut);font-size:12px}
table{width:100%;border-collapse:separate;border-spacing:0;font-size:13px;background:var(--panel);border:1px solid var(--line);border-radius:14px;overflow:hidden;box-shadow:var(--sh-sm)}
th,td{text-align:left;padding:11px 14px;border-bottom:1px solid var(--line);vertical-align:top}
tr:last-child td{border-bottom:0}
th{color:var(--mut);font-weight:700;font-size:11px;text-transform:uppercase;letter-spacing:.5px;background:#fafafb}
.wk{color:var(--purple);font-weight:700;white-space:nowrap}.vrow td{color:var(--good);background:#f6fbf6}
textarea{width:100%;min-height:110px;background:#fff;color:var(--ink);border:1.5px solid var(--line-strong);border-radius:11px;padding:13px;font-family:inherit;font-size:14px;line-height:1.5;transition:border-color .12s,box-shadow .12s}
textarea:focus{outline:0;border-color:var(--purple);box-shadow:0 0 0 3px var(--purple-soft)}
button{background:var(--purple);color:#fff;border:0;border-radius:10px;padding:11px 18px;font-weight:600;cursor:pointer;font-size:14px;transition:.12s;box-shadow:var(--sh-sm)}button:hover{background:var(--purple-d);box-shadow:var(--sh-md)}button:active{transform:translateY(1px)}
.mis{background:var(--panel);border:1px solid var(--line);border-left:4px solid var(--warn);border-radius:12px;padding:14px;margin:10px 0;box-shadow:var(--sh-sm)}
.mis .pct{color:var(--warn);font-weight:700}.tiltak{color:var(--good);font-size:13px;margin-top:8px;padding-top:8px;border-top:1px solid var(--line)}
.note{background:var(--purple-soft);border:1px solid #d4d8f4;border-radius:12px;padding:15px;margin-top:16px;color:#2e3270;font-size:14px;box-shadow:var(--sh-sm)}
.resept{margin-top:18px;background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:16px;box-shadow:var(--sh-sm)}
.resept .rhdr{font-weight:700;font-size:15px;color:var(--ink)}
.resept .rsub{color:var(--mut);font-size:13px;margin:4px 0 14px}
.resept .rgroup{font-size:13px;font-weight:600;color:var(--warn);margin:14px 0 8px;text-transform:uppercase;letter-spacing:.03em}
.rtopic{border:1px solid var(--line);border-left:4px solid var(--purple);border-radius:11px;padding:12px 14px;margin:9px 0;background:var(--bg)}
.rt-head{display:flex;justify-content:space-between;align-items:center;gap:10px}
.rt-cnt{font-size:12px;color:var(--purple);background:var(--purple-soft);border-radius:20px;padding:2px 10px;white-space:nowrap}
.rt-why{font-size:12.5px;color:var(--mut);margin-top:3px}
.rt-links{margin-top:9px;display:flex;flex-wrap:wrap;gap:7px}
.rt-links a{font-size:12.5px;color:var(--purple-d);text-decoration:none;background:#fff;border:1px solid var(--line-strong);border-radius:8px;padding:5px 10px}
.rt-links a:hover{background:var(--purple-soft);border-color:var(--purple)}
.chat{background:var(--bg);border:1px solid var(--line);border-radius:13px;padding:13px;min-height:120px;margin-bottom:12px}
.msg{margin:9px 0;padding:11px 14px;border-radius:13px;max-width:88%;font-size:14px;box-shadow:var(--sh-sm)}
.me{background:var(--purple);color:#fff;margin-left:auto}.ai{background:var(--panel);border:1px solid var(--line)}
.ai.ok{border-left:4px solid var(--good)}.ai.warn{border-left:4px solid var(--warn)}.ai.stop{border-left:4px solid var(--bad)}
.ai .vd{font-weight:700;margin-bottom:4px}.ex{font-size:13px;color:var(--mut);margin:6px 0;line-height:1.7}.ex b{color:var(--purple);cursor:pointer;background:var(--purple-soft);border-radius:6px;padding:2px 7px;font-weight:600}.ex b:hover{background:#e2e5f7}
.pill{font-size:12px;color:var(--mut)}select{padding:9px 11px;border-radius:9px;border:1.5px solid var(--line-strong);font:inherit;margin-bottom:12px;width:100%;background:#fff;cursor:pointer}select:focus{outline:0;border-color:var(--purple);box-shadow:0 0 0 3px var(--purple-soft)}
.assistant{width:360px;flex-shrink:0;border-left:1px solid var(--line);background:var(--panel);display:flex;flex-direction:column;transition:width .15s;position:sticky;top:0;height:100vh;box-shadow:-4px 0 16px rgba(20,20,40,.04)}
.assistant.collapsed{width:52px}
.asst-head{display:flex;align-items:center;justify-content:space-between;padding:16px 18px;border-bottom:1px solid var(--line);font-weight:700;font-size:15px}
.asst-collapse{cursor:pointer;color:var(--mut);font-size:22px;line-height:1;width:28px;height:28px;display:flex;align-items:center;justify-content:center;border-radius:7px;transition:.12s}.asst-collapse:hover{background:var(--bg);color:var(--ink)}
.asst-body{padding:16px;display:flex;flex-direction:column;gap:11px;overflow:auto;flex:1}
.assistant.collapsed .asst-head,.assistant.collapsed .asst-body{display:none}
.asst-rail{display:none}
.assistant.collapsed .asst-rail{display:flex;align-items:center;justify-content:center;height:100%;cursor:pointer;writing-mode:vertical-rl;color:var(--purple);font-weight:700;letter-spacing:1px;gap:14px}
.asst-rail .dot{width:30px;height:30px;border-radius:9px;background:linear-gradient(135deg,var(--purple),#7a7ed6);color:#fff;display:flex;align-items:center;justify-content:center;writing-mode:horizontal-tb;box-shadow:var(--sh-sm)}
.asst-hint{font-size:13px;color:var(--mut);line-height:1.55;background:var(--bg);border-radius:10px;padding:11px 13px}
.assistant .chat{flex:1;min-height:180px}
/* Linear-stil meldingsfelt: flatt, raffinert, diskret */
.composer{border:1px solid var(--line-strong);border-radius:8px;background:#fcfcfd;transition:border-color .12s,background .12s}
.composer:focus-within{border-color:#c5c8e8;background:#fff;box-shadow:0 0 0 1px rgba(94,106,210,.18)}
.composer-input{padding:9px 12px 2px}
.composer-input textarea{width:100%;min-height:20px;max-height:140px;border:0;outline:0;background:transparent;box-shadow:none;padding:1px 0;margin:0;font-family:inherit;font-size:13.5px;line-height:1.5;color:var(--ink);resize:none;letter-spacing:-.01em}
.composer-input textarea:focus{border:0;box-shadow:none}
.composer-input textarea::placeholder{color:#9a9aa6}
.composer-bar{display:flex;align-items:center;justify-content:space-between;padding:2px 6px 6px}
.ct-left{display:flex;gap:0}
.ct-icon{background:transparent;color:#9a9aa6;border:0;border-radius:6px;width:28px;height:28px;padding:0;display:flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:none;transition:.1s}
.ct-icon:hover{background:rgba(94,106,210,.08);color:var(--purple);box-shadow:none}.ct-icon:active{transform:none}
.ct-icon svg{width:16px;height:16px}
.ct-send{background:transparent;color:#b6b6c2;border:0;border-radius:6px;width:28px;height:28px;padding:0;display:flex;align-items:center;justify-content:center;cursor:default;box-shadow:none;transition:.12s}
.ct-send svg{width:17px;height:17px}
.ct-send.on{background:var(--purple);color:#fff;cursor:pointer;box-shadow:0 1px 2px rgba(94,106,210,.4)}.ct-send.on:hover{background:var(--purple-d)}.ct-send:active{transform:none}
.typing{display:flex;gap:4px;align-items:center;padding:2px 0}
.typing span{width:6px;height:6px;border-radius:50%;background:#b6b6c2;animation:tdot 1.2s infinite ease-in-out}
.typing span:nth-child(2){animation-delay:.18s}.typing span:nth-child(3){animation-delay:.36s}
@keyframes tdot{0%,60%,100%{opacity:.25;transform:translateY(0)}30%{opacity:1;transform:translateY(-3px)}}
.composer-hint{font-size:11px;color:#a6a6b0;padding:6px 2px 0;letter-spacing:.01em}
.composer-hint kbd{font:inherit;background:var(--bg);border:1px solid var(--line);border-radius:4px;padding:0 4px;color:var(--mut)}
</style></head><body>
<div id="landing">
 <div class="brand"><div class="logo">&#8721;</div><div><h1>Skole-AI</h1></div></div>
 <div class="tag">Laererkontrollert AI-laeringsassistent &middot; all matematikk VGS &middot; ingen elevdata</div>
 <div id="menu"></div>
</div>
<div class="app" id="workspace">
 <div class="rail"><div class="back" onclick="goHome()">&#8592; Bytt fag</div>
  <div class="subj" id="wsName"></div><div class="subj-meta" id="wsMeta"></div><div class="nav" id="wsNav"></div></div>
 <div class="main" id="wsMain"></div>
 <div class="assistant" id="assistant">
  <div class="asst-head"><span>Per &middot; AI-assistent</span><span class="asst-collapse" onclick="toggleAsst()">&#8250;</span></div>
  <div class="asst-body">
   <div class="asst-hint" id="asstHint">Hei, jeg er Per. Spør meg om hva som helst — faglig, planlegging, eller noe helt annet.</div>
   <div class="ex" id="chatEx"></div>
   <div class="chat" id="chatlog"></div>
   <div class="composer" id="composer">
    <div class="composer-input"><textarea id="chatin" rows="1" placeholder="Spør Per om hva som helst …" oninput="onComposerInput()" onkeydown="composerKey(event)"></textarea></div>
    <div class="composer-bar">
     <div class="ct-left">
      <button class="ct-icon" type="button" title="Formatering" tabindex="-1"><svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor"><path d="M5 7V5h14v2h-6v12h-2V7H5z"/></svg></button>
      <button class="ct-icon" type="button" title="Emoji" tabindex="-1"><svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.6"><circle cx="12" cy="12" r="9"/><path d="M8.5 14.5s1.3 1.8 3.5 1.8 3.5-1.8 3.5-1.8" stroke-linecap="round"/><circle cx="9" cy="9.5" r="1" fill="currentColor" stroke="none"/><circle cx="15" cy="9.5" r="1" fill="currentColor" stroke="none"/></svg></button>
      <button class="ct-icon" type="button" title="Vedlegg" tabindex="-1"><svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M20.5 11.5l-8.6 8.6a5 5 0 0 1-7.1-7.1l8.6-8.6a3.3 3.3 0 0 1 4.7 4.7l-8.6 8.6a1.7 1.7 0 0 1-2.4-2.4l7.9-7.9"/></svg></button>
     </div>
     <button class="ct-send" id="ctSend" type="button" onclick="sendChat()" title="Send" disabled><svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor"><path d="M3.4 20.4l17.45-7.48a1 1 0 0 0 0-1.84L3.4 3.6a.993.993 0 0 0-1.39.91L2 9.12c0 .5.37.93.87.99L17 12 2.87 13.88c-.5.07-.87.5-.87 1l.01 4.61c0 .71.73 1.2 1.39.91z"/></svg></button>
    </div>
   </div>
  </div>
  <div class="asst-rail" onclick="toggleAsst()"><div class="dot">&#8721;</div><span>Per</span></div>
 </div>
</div>

, "tekst": "identifisere variable størrelser i ulike situasjoner og bruke dem til utforsking og generalisering", "kjerne": ["Utforsking og problemløysing", "Abstraksjon og generalisering"], "strand": "funksjoner"}, {"kode": "KM335", "tekst": "tolke og bruke formler som gjelder samfunnsliv og arbeidsliv", "kjerne": ["Modellering og anvendingar", "Abstraksjon og generalisering"], "strand": "funksjoner"}, {"kode": "KM324", "tekst": "bruke prosent, prosentpoeng, promille og vekstfaktor i utregninger og presentere og begrunne løsninger", "kjerne": ["Modellering og anvendingar", "Resonnering og argumentasjon"], "strand": "tallregning"}, {"kode": "KM323", "tekst": "utforske, beskrive og bruke begrepene proporsjonalitet og omvendt proporsjonalitet", "kjerne": ["Utforsking og problemløysing", "Representasjon og kommunikasjon"], "strand": "proporsjonalitet"}, {"kode": "KM326", "tekst": "tolke og bruke sammensatte måleenheter i praktiske sammenhenger og velge egnet måleenhet", "kjerne": ["Modellering og anvendingar", "Abstraksjon og generalisering"], "strand": "proporsjonalitet"}, {"kode": "KM322", "tekst": "tolke og bruke funksjoner i matematisk modellering og problemløsing", "kjerne": ["Utforsking og problemløysing", "Modellering og anvendingar", "Resonnering og argumentasjon"], "strand": "funksjoner"}, {"kode": "KM321", "tekst": "planlegge, utføre og presentere selvstendig arbeid knyttet til modellering og funksjoner innenfor samfunnsfaglige temaer", "kjerne": ["Modellering og anvendingar", "Representasjon og kommunikasjon"], "strand": "problemlosing"}, {"kode": "KM372", "tekst": "bruke digitale verktøy i utforsking og problemløsing knyttet til egenskaper ved funksjoner, og diskutere løsningene", "kjerne": ["Utforsking og problemløysing", "Resonnering og argumentasjon", "Representasjon og kommunikasjon"], "strand": "funksjoner"}, {"kode": "KM373", "tekst": "tolke og regne med rotuttrykk, potenser og tall på standardform", "kjerne": ["Modellering og anvendingar", "Resonnering og argumentasjon"], "strand": "tallregning"}], "tax": {"KM325": [{"id": "TEKST-01", "beskrivelse": "Elever henter ut alle tall fra teksten og regner med dem uten å vurdere relevans: distraktortall trekkes inn i beregningen.", "nokkelord": ["brukte alle tallene i teksten", "regnet med det som stod", "tok med hvert tall", "la inn alle verdier"], "tiltak": "Lag oppgaver der ett eller flere tall er irrelevante (distraktorer). La elever identifisere hva som faktisk er spurt om og begrunne valg av tall skriftlig, før de begynner å regne."}], "KM328": [{"id": "PREM-01", "beskrivelse": "Elever tror at en endring i ett premiss (f.eks. annen rentesats) bare har lokal, isolert effekt, uten å oppdage at endringen kan endre hele løsningsstrukturen eller konklusjonen.", "nokkelord": ["bare ett tall endrer seg", "justerer bare det ene", "det påvirker ikke resten", "regner om bare den delen"], "tiltak": "Bygg oppgaver der ett premiss endres, og krev at elever gjennomgår hele løsningsrekken på nytt. Bruk regneark slik at premissendringen synliggjøres dynamisk i alle avhengige celler."}], "KM330": [{"id": "MOD-01", "beskrivelse": "Elever ekstrapolerer modellen langt utenfor det observerte dataområdet uten å problematisere gyldigheten, f.eks. «ifølge den lineære modellen vil befolkningen om 500 år være X».", "nokkelord": ["ifølge modellen", "forlenger linjen", "vil alltid vokse", "ekstrapolerer", "utenfor området"], "tiltak": "Still eksplisitt spørsmålet «Hvor lenge er denne modellen gyldig?» La elever identifisere naturlige begrensninger (negativt salg er umulig, vekst stopper opp, osv.)."}, {"id": "MOD-02", "beskrivelse": "Elever forveksler modellen med virkeligheten og presenterer modellresultater som eksakte faktapåstander uten å nevne at forenklinger er gjort.", "nokkelord": ["dette er eksakt", "nøyaktig svar", "modellen viser nøyaktig", "sant i virkeligheten"], "tiltak": "La elever eksplisitt liste opp hvilke forenklinger og antakelser som er lagt til grunn i modellen, og vurdere hvilke faktorer som er utelatt."}], "KM329": [{"id": "VAR-01", "beskrivelse": "Elever oppfatter bokstaver i algebraiske uttrykk som forkortelser for konkrete objekter (f.eks. «b = biler») heller enn som variable størrelser.", "nokkelord": ["b er biler", "x betyr en gjenstand", "bokstaven står for", "er en forkortelse"], "tiltak": "Vis eksempler der samme bokstav kan ha ulike verdier i ulike kontekster. Understrek at en variabel representerer et ukjent eller varierende tall, ikke et objekt."}, {"id": "VAR-02", "beskrivelse": "Elever tror at like bokstaver nødvendigvis har samme tallverdi i ulike, urelaterte uttrykk eller ligninger.", "nokkelord": ["x er det samme", "samme bokstav = samme tall", "begge x er like", "de har lik verdi"], "tiltak": "Vis to ulike ligninger som begge bruker x, men der x har ulik verdi i de to tilfellene. Forklar at en variabels verdi er bundet til konteksten den opptrer i."}], "KM335": [{"id": "FORM-01", "beskrivelse": "Elever setter inn tall i en formel uten å forstå hvilken størrelse som er avhengig og hvilken som er uavhengig (svak formelforståelse – «plugging in»-atferd).", "nokkelord": ["brukte formelen", "satte bare inn tallene", "vet ikke hva som er ukjent", "tok alle tallene inn"], "tiltak": "Krev at elever forklarer med egne ord hva hvert symbol betyr og hvilken størrelse de vil finne, før de setter inn tall. Bruk enheter konsekvent som kontroll på at riktig størrelse er funnet."}, {"id": "FORM-02", "beskrivelse": "Elever bruker renters rente-formelen (eksponentiell) i situasjoner som krever enkel rente (lineær), eller omvendt.", "nokkelord": ["brukte 1,05^n", "enkel rente", "ganger med n", "feil formel", "tok renters rente"], "tiltak": "Bygg en tabell for begge metoder med samme data over noen år og sammenlign resultatene. Diskuter hvilke situasjoner (kontobeholdning vs. fast avkastning) som svarer til hvilken modell."}], "KM324": [{"id": "PROSENT-01", "beskrivelse": "Elever adderer prosentandeler i stedet for å multiplisere vekstfaktorene, f.eks. konkluderer at 20 % rabatt etterfulgt av 10 % rabatt er 30 % samlet rabatt.", "nokkelord": ["legger sammen prosentene", "20% + 10% = 30%", "totalt 30% rabatt", "adderte prosentene"], "tiltak": "La elever starte med et konkret beløp (1000 kr) og beregne begge veier: 1000 × 0,80 × 0,90 = 720, ikke 700. Bruk gjerne arealtabell (tobokskart) for å visualisere at faktorene multipliseres."}, {"id": "PROSENT-02", "beskrivelse": "Elever blander prosent og prosentpoeng: en rente som stiger fra 3 % til 5 % oppgis som 'økt med 2 %' i stedet for '2 prosentpoeng' (eller ~67 % relativ økning).", "nokkelord": ["økte med 2%", "2 prosent høyere", "differansen er 2 prosent", "steg med 2 prosent"], "tiltak": "Innfør begrepsparet eksplisitt med samme eksempel: «økte med 2 prosentpoeng» vs. «økte med ca. 67 %». Bruk medieoppslag om renteendringer eller valgresultater som autentiske kontekster."}, {"id": "PROSENT-03", "beskrivelse": "Elever tror at en økning på 25 % etterfulgt av en nedgang på 25 % gir opprinnelig verdi tilbake (grunnlagsforvirring ved base-endring).", "nokkelord": ["tilbake til start", "nuller hverandre ut", "samme prosent opp og ned", "opprinnelig verdi igjen"], "tiltak": "Regn konkret: 100 kr × 1,25 = 125 kr; 125 kr × 0,75 = 93,75 kr. Diskuter at grunnlaget for nedgangen (125 kr) er større enn det opprinnelige grunnlaget (100 kr)."}], "KM323": [{"id": "PROP-01", "beskrivelse": "Additiv i stedet for multiplikativ resonnering (klassisk funn hos Hart, 1984): elever løser proporsjonsoppgaver ved å bruke differanser i stedet for forholdstall, f.eks. «A:B er 3:5, C:D er ?:8 – svaret er 3+(8−5)=6» i stedet for C = 3×(8/5) = 4,8.", "nokkelord": ["legger til differansen", "plusser på det samme", "trekker fra det samme", "øker med like mye", "la til 3"], "tiltak": "Bruk dobbel tallinje (double number line) og tabell for å synliggjøre den multiplikative strukturen. La elever sammenligne additiv og multiplikativ metode med et konkret eksempel og verifisere ved tilbakekontroll."}, {"id": "PROP-02", "beskrivelse": "Elever antar at alle sammenhenger er direkte proporsjonale (lineær bias) og bruker kryssproduktmetoden ukritisk på ikke-proporsjonale situasjoner.", "nokkelord": ["setter opp brøk", "kryssprodukt", "jo mer jo mer", "direkte proporsjonalt", "dobbelt så mye tid"], "tiltak": "Presenter bevisste moteksempler: pris per vare er proporsjonal, men ikke alle hverdagslige sammenhenger er det. Still eksplisitt spørsmålet 'Er dette en proporsjonal sammenheng?' før elevene setter opp regning."}, {"id": "PROP-03", "beskrivelse": "Elever blander direkte og omvendt proporsjonalitet: de skriver y = k·x i situasjoner der riktig modell er y = k/x.", "nokkelord": ["y = k ganger x", "jo mer desto mer", "direkte proporsjonalt", "samme formel", "brukte y = kx"], "tiltak": "Bruk situasjonen 'Flere arbeidere → kortere tid'. La elever fylle ut tabell og tegne grafen, og oppdage at kurven er en hyperbel, ikke en rett linje gjennom origo. Diskuter hva omvendt proporsjonalitet betyr intuitivt."}], "KM326": [{"id": "MAAL-01", "beskrivelse": "Elever glemmer enhetsomregning i sammensatte måleenheter og blander f.eks. km/t og m/s i samme utregning.", "nokkelord": ["glemte å omregne", "km/t og m/s", "brukte km direkte", "feil enhet"], "tiltak": "Krev at elever skriver ned enheter i alle ledd og kansellerer dem eksplisitt (dimensjonsanalyse). Gi huskeregel: km/t × (1000 m/km) / (3600 s/t) = m/s."}, {"id": "MAAL-02", "beskrivelse": "Elever forveksler lengdeskalering og arealskalering: de tror at et areal dobles når sidelengden dobles.", "nokkelord": ["arealet dobles", "dobbel lengde gir dobbelt areal", "ganger arealet med 2", "to ganger så stort areal"], "tiltak": "Tegn konkrete figurer med doble sidelengder og tell enhetsruter. Vis at sidelengde ×2 gir areal ×4. Generaliser: faktor k for lengde gir faktor k² for areal."}], "KM322": [{"id": "FUNK-01", "beskrivelse": "Elever leser av funksjonsverdiens høyde der de burde lese veksthastigheten (stigningstallet), f.eks. svarer «raskest vekst der grafen er høyest» i stedet for der stigningstallet er størst.", "nokkelord": ["høyeste punkt", "topp av grafen", "størst verdi", "der den er på topp"], "tiltak": "Still eksplisitt spørsmål om «raskest vekst» vs. «størst verdi» med samme graf. Introduser begrepspar: stigningstall (veksthastighet) vs. funksjonsverdi (høyde). La elever tegne tangenter og sammenligne."}, {"id": "FUNK-02", "beskrivelse": "Elever tror alle funksjoner er lineære og forsøker å finne et stigningstall også for eksponentielle eller kvadratiske sammenhenger.", "nokkelord": ["rett linje", "stigningstall", "y = ax + b", "konstant vekst", "lineær sammenheng"], "tiltak": "La elever plotte punkter fra en eksponentiell situasjon (f.eks. dobling av bakterier) og konstatere at de ikke ligger på en rett linje. Diskuter at veksttype avhenger av sammenhengene i situasjonen."}, {"id": "FUNK-03", "beskrivelse": "Elever forveksler funksjon og ligning: de behandler f(x) = 2x + 3 som en ligning som skal løses for x, i stedet for som en regel som gir en y-verdi for enhver x-verdi.", "nokkelord": ["løser for x", "finner x =", "satte lik null", "behandler det som en ligning"], "tiltak": "Bruk funksjonsmaskin-metaforen: input → operasjon → output. Vis eksplisitt at f(3) betyr å sette inn 3 og beregne 2·3+3=9. Unngå å blande funksjon og ligning i oppgavepresentasjoner."}], "KM372": [{"id": "DIG-01", "beskrivelse": "Elever aksepterer ukritisk resultater fra digitale verktøy uten å vurdere om svaret er rimelig, f.eks. godtar en negativ radius som svar fra GeoGebra.", "nokkelord": ["datamaskinen sier", "ifølge grafen er svaret", "geogebra ga", "tok svaret fra programmet", "programmet regnet ut"], "tiltak": "Krev alltid en overslags-kontroll: «Ser svaret rimelig ut?» og «Hva forventet du?». Bruk bevisst eksempler der feil inndata gir meningsløse resultater, og la elever oppdage og forklare feilen."}], "KM373": [{"id": "POT-01", "beskrivelse": "Elever multipliserer eksponentene ved multiplikasjon av potenser med samme grunntall, dvs. de tror a^m · a^n = a^(m·n) i stedet for a^(m+n).", "nokkelord": ["ganger eksponentene", "2³ · 2⁴ = 2¹²", "multipliserte oppe", "gangret eksponentene"], "tiltak": "Skriv ut potensene som gjentatt multiplikasjon: (2·2·2)·(2·2·2·2) = 2^7. La elever telle faktorer selv. Generaliser mønsteret til symboler før regneregelen formuleres."}, {"id": "POT-02", "beskrivelse": "Elever tolker negative eksponenter som at selve verdien er negativ, f.eks. skriver 2^(−3) = −8.", "nokkelord": ["negativ eksponent betyr negativt svar", "2^-3 = -8", "minus foran", "negativt fordi eksponenten er negativ"], "tiltak": "Vis eksponentmønsteret nedover: 2³=8, 2²=4, 2¹=2, 2⁰=1, 2^(−1)=1/2. La elever oppdage at hvert steg ned deler på grunntallet, og at negative eksponenter gir positive brøker."}, {"id": "POT-03", "beskrivelse": "Elever oppfatter √a som a/2, dvs. forveksler kvadratroten med halvering.", "nokkelord": ["deler på 2", "√9 = 4,5", "roten er halvparten", "halverte verdien"], "tiltak": "Definer kvadratroten via inversoperasjonen til kvadrering: √9 = x slik at x² = 9. La elever bekrefte svaret ved å kvadrere det de finner."}]}, "kw": {"tekster": ["KM325"], "lokalmil": ["KM325"], "beregnin": ["KM325"], "hvordan": ["KM328"], "premisse": ["KM328"], "påvirke": ["KM328"], "samfunns": ["KM321", "KM328", "KM330", "KM335"], "arbeidsl": ["KM328", "KM330", "KM335"], "modellen": ["KM330"], "gyldige": ["KM330"], "variable": ["KM329"], "størrels": ["KM329"], "utforski": ["KM329", "KM372"], "gjelder": ["KM335"], "prosent": ["KM324"], "prosentp": ["KM324"], "promille": ["KM324"], "vekstfak": ["KM324"], "utregnin": ["KM324"], "begrunne": ["KM324"], "løsninge": ["KM324", "KM372"], "beskrive": ["KM323"], "proporsj": ["KM323"], "omvendt": ["KM323"], "sammensa": ["KM326"], "måleenhe": ["KM326"], "funksjon": ["KM321", "KM322", "KM372"], "matemati": ["KM322"], "modeller": ["KM321", "KM322"], "probleml": ["KM322", "KM372"], "planlegg": ["KM321"], " ingar", "Representasjon og kommunikasjon"], "strand": "analyse"}, {"kode": "KM398", "tekst": "forklare polynomdivisjon og bruke det til å omskrive algebraiske uttrykk, drøfte funksjoner og løse ligninger og ulikheter", "kjerne": ["Representasjon og kommunikasjon"], "strand": "funksjoner"}, {"kode": "KM394", "tekst": "gjøre rede for definisjonene av sinus, cosinus og tangens og bruke trigonometri til å beregne lengder, vinkler og arealer i vilkårlige trekanter", "kjerne": ["Modellering og anvendingar"], "strand": "trigonometri"}, {"kode": "KM393", "tekst": "begrunne sinus-, cosinus- og arealsetningen", "kjerne": ["Resonnering og argumentasjon"], "strand": "trigonometri"}, {"kode": "KM409", "tekst": "bruke trigonometri til å analysere og løse sammensatte teoretiske og praktiske problemer med lengder, vinkler og arealer", "kjerne": ["Modellering og anvendingar"], "strand": "trigonometri"}], "tax": {"KM403": [{"id": "KM403-M1", "beskrivelse": "Eleven forveksler tilordning og matematisk likhet i programmering: enten tror eleven at x = x + 1 er en selvmotsigelse umulig å gjennomføre, eller omvendt at betingelsesoperatoren == betyr tilordning. Dette hindrer korrekt lesing og skriving av kode.", "nokkelord": ["x = x + 1 er umulig", "== er det samme som =", "tilordning er en ligning", "hvorfor er x = x + 1 lov"], "tiltak": "Demonstrer i Python steg for steg: vis variabelens verdi før og etter x = x + 1 med print(). Lag en tabell over variabeltilstand per linje. Forklar at = i kode er en envegsoperasjon (evaluer høyre side, lagre i venstre), ikke en matematisk ekvivalens."}, {"id": "KM403-M2", "beskrivelse": "Eleven tror at digitale verktøy og algoritmer alltid gir eksakte svar, og forstår ikke at desimalrepresentasjon i datamaskiner kan gi avrundingsfeil som påvirker matematiske beregninger.", "nokkelord": ["datamaskinen har alltid rett", "koden gir eksakt svar", "ingen feil i programmet", "0.1 + 0.2 = 0.3"], "tiltak": "Kjør 0.1 + 0.2 == 0.3 i Python og vis at resultatet er False. Diskuter hva dette betyr for sammenligning av desimaltall i kode, og introduser bruk av abs(a − b) < ε som alternativ til ==."}], "KM395": [{"id": "KM395-M1", "beskrivelse": "Eleven tror at å verifisere en påstand for mange numeriske eksempler utgjør et fullstendig matematisk bevis (empirisk bevisoppfatning). Dette er en av de vanligste og mest robuste misforståelsene i bevisopplæring (Harel & Sowder 1998; Stylianides & Stylianides 2009).", "nokkelord": ["jeg prøvde mange tall", "det stemte for x=1,2,3,4,5", "det ser alltid ut til å stemme", "bevist med eksempel"], "tiltak": "Presenter Eulers formel n² + n + 41 som er primtall for n = 0, 1, ..., 39 men ikke for n = 40. Diskuter at ett moteksempel motbeviser, men ingen mengde eksempler beviser. Forklar hva et formelt bevis krever: generell argumentasjon som dekker alle tilfeller."}, {"id": "KM395-M2", "beskrivelse": "Eleven forveksler en implikasjon med dens konverse: etter å ha bevist P ⇒ Q, tror eleven at Q ⇒ P automatisk gjelder, noe som kan lede til feilaktige konklusjoner ved bevising av ekvivalenser.", "nokkelord": ["begge veier gjelder", "det motsatte er også sant", "hvis det ene gjelder gjelder det andre", "konverse er alltid sann"], "tiltak": "Gi et konkret eksempel: 'hvis x = 2, så er x² = 4' er sann, men 'hvis x² = 4, så er x = 2' er falsk (x kan være −2). Introduser symbolene ⇒ og ⇔ og drøft når dobbel implikasjon krever separat bevis for begge retninger."}], "KM397": [{"id": "KM397-M1", "beskrivelse": "Eleven behandler variabelen som et bestemt ukjent tall heller enn en varierende størrelse. Dette fører til at eleven tolker formler som oppgaver som alltid skal løses for x, og mister forståelsen av at en formel uttrykker en generell sammenheng mellom størrelser (jf. Küchemann 1981; MacGregor & Stacey 1997).", "nokkelord": ["finn x", "hva er x lik", "x er et bestemt tall", "løs for x"], "tiltak": "Bruk dynamiske representasjoner i GeoGebra der eleven ser variabelen endre verdi kontinuerlig. Diskuter eksplisitt forskjellen mellom 'finn x i denne ligningen' og 'la x variere i denne formelen', og la eleven beregne formelens verdi for minst fem ulike x-verdier."}, {"id": "KM397-M2", "beskrivelse": "Eleven bruker bokstaver som forkortelser for konkrete objekter eller enheter (a = antall epler, k = kr) heller enn som algebraiske variable. Dette hindrer korrekt oppsett og manipulasjon av formler, og er en veldokumentert misforståelse i tidlig algebraopplæring.", "nokkelord": ["la a = epler", "k betyr kroner", "bokstaven er forkortelse", "a er antall"], "tiltak": "Krev at eleven alltid skriver en presis definisjon med enhet: 'la x = antall epler'. Drøft at a·2 betyr 'to ganger antall', og at bokstaven kan erstattes av ethvert tall – det er ikke en etikett."}], "KM404": [{"id": "KM404-M1", "beskrivelse": "Eleven snur ikke ulikhetstegnet ved multiplikasjon eller divisjon med et negativt tall: løser −2x > 6 til x > −3 i stedet for x < −3. Forskning (Vlassis 2002) viser at fortegnshåndtering er blant de mest frekvente feilkildene i algebra.", "nokkelord": ["gang begge sider med minus", "del på negativt tall", "ulikheten snur ikke", "minus ganger begge sider"], "tiltak": "Start med konkrete talleksempler: 4 > 2, gang med −1 gir −4 og −2, og −4 < −2. La eleven selv oppdage regelen fra eksemplene, og bruk tallinje for visuell støtte."}, {"id": "KM404-M2", "beskrivelse": "Eleven løser et ligningssystem ved å behandle de to ligningene som uavhengige oppgaver: finner x fra ligning 1 og y fra ligning 2 uten å bruke begge ligningene til å bestemme begge variable simultant.", "nokkelord": ["finn x i den første", "finn y i den andre", "to separate ligninger", "løs dem hver for seg"], "tiltak": "Visualiser systemet grafisk: tegn begge linjene i samme koordinatsystem og vis at løsningen er skjæringspunktet – det punktet som tilfredsstiller begge ligningene samtidig. Koble algebraisk metode til grafisk representasjon."}, {"id": "KM404-M3", "beskrivelse": "Eleven utfører aritmetiske operasjoner bare på én side av en ligning, typisk 'flytter et ledd over likhetstegnet' uten å forstå den underliggende symmetriprinsippet, og gjør fortegnsfeil i prosessen.", "nokkelord": ["flytt over til andre siden", "trekk fra bare her", "leddet bytter fortegn når det flyttes", "legg til bare høyre side"], "tiltak": "Bruk balansemetaforen eksplisitt: tegn en vektskål og vis at samme operasjon må gjøres på begge sider. La eleven alltid skrive 'legger til … på begge sider' som en eksplisitt begrunn i løsningsoppsettet."}], "KM396": [{"id": "KM396-M1", "beskrivelse": "Eleven forveksler identitet og ligning: behandler en identitet som x² − 1 = (x−1)(x+1) som om det er en ligning som skal løses for konkrete x-verdier, i stedet for å anerkjenne at den gjelder for alle x (jf. Sfard 1991 om operasjonell vs. strukturell forståelse).", "nokkelord": ["løs for x", "finn x i identiteten", "sett lik null", "x^2 - 1 = (x-1)(x+1) gir x ="], "tiltak": "Sett inn minst fire ulike tall for x på begge sider og vis at likheten alltid holder. Sammenlign med x² = 4, der bare x = ±2 fungerer. Diskuter at «sann for alle x» er kjennetegnet på en identitet."}, {"id": "KM396-M2", "beskrivelse": "Eleven tror at et algebraisk uttrykk og en funksjon er det samme, og overfører lineære egenskaper til alle funksjoner: f(x + 2) = f(x) + f(2), f(x · y) = f(x) · f(y) (linearitetsantagelse – jf. forskning på «linearity illusion», De Bock et al. 2007).", "nokkelord": ["f(x+2) = f(x) + 2", "f(a+b) = f(a) + f(b)", "legg til inni parentesen", "fordel over addisjon"], "tiltak": "La eleven beregne f(1 + 2) og f(1) + f(2) for f(x) = x² og for f(x) = √x. Diskuter at lineariteten f(a + b) = f(a) + f(b) er et spesialtilfelle, ikke en generell regel."}, {"id": "KM396-M3", "beskrivelse": "Eleven tolker likhetstegnet operasjonelt ('gir svaret') heller enn relasjonelt ('er lik'), noe som hindrer algebraisk manipulasjon og forståelse av at en ligning kan omskrives. Dette er en av de mest robuste misforståelsene i algebraopplæring (Kieran 1992; Knuth et al. 2006).", "nokkelord": ["= betyr svaret er", "skriv svaret etter likhetstegnet", "regn ut til =", "= er slutten"], "tiltak": "Bruk oppgaver der eleven må skrive noe på venstre side av =, og oppgaver der ligningen er skrevet 'baklengs' (5 = 2x + 1). Diskuter likhetstegnet som en symmetrisk relasjon og bruk vektskål-metaforen."}], "KM400": [{"id": "KM400-M1", "beskrivelse": "Eleven anvender feil kvadratsetning: beregner (a + b)² = a² + b² og utelater det doble kryssleddet 2ab. Dette er en av de hyppigst dokumenterte algebraiske feilene i videregående matematikk (se bl.a. Ryan & Williams 2007).", "nokkelord": ["(a+b)^2 = a^2 + b^2", "kvadratet av summen er summen av kvadratene", "glemte midtleddet", "2ab er ikke med"], "tiltak": "Bruk geometrisk illustrasjon: tegn et kvadrat med side (a + b) og vis at arealet gir fire deler: a², b², ab og ab. Verifiser med talleksempel: (3 + 4)² = 49, men 3² + 4² = 25. La eleven selv generalisere."}, {"id": "KM400-M2", "beskrivelse": "Eleven forveksler nullpunktene til f(x) = ax² + bx + c med toppunktet/bunnpunktet, eller tror parabelen alltid har toppunkt i origo. Vaiyavutjamai & Clements (2006) dokumenterer at elever mangler klar forståelse av sammenhengen mellom ligningens røtter og funksjonens graf.", "nokkelord": ["toppunktet er der grafen krysser x-aksen", "bunnpunktet er nullpunktet", "toppunktet er i origo", "parabelen topper ved x=0"], "tiltak": "Tegn parabler med GeoGebra og la eleven identifisere nullpunkter og toppunkt som separate objekter. Utled toppunktets x-koordinat via fullstendig kvadrat og vis grafisk at det ikke er det samme som nullpunktene."}, {"id": "KM400-M3", "beskrivelse": "Eleven tror at en andregradslikning alltid har to reelle løsninger og ignorerer at diskriminanten kan være null eller negativ, særlig fordi de fleste øvingsoppgaver har to løsninger.", "nokkelord": ["det er alltid to svar", "abc-formelen gir alltid to røtter", "to nullpunkter alltid", "diskriminanten er alltid positiv"], "tiltak": "Presenter eksplisitt alle tre tilfeller (D > 0, D = 0, D < 0) med grafer og algebraiske eksempler. Forklar geometrisk: D < 0 betyr parabelen aldri skjærer x-aksen. La eleven lage egne eksempler for hvert tilfelle."}], "KM402": [{"id": "KM402-M1", "beskrivelse": "Eleven likestiller den matematiske modellen med virkeligheten og tar ikke hensyn til modellantagelsene og gyldighetsområdet. Dette er en grunnleggende svakhet i modelleringskompetanse og erkjent i PISA-rammeverk for matematisk literacy.", "nokkelord": ["modellen gir det eksakte svaret", "matematikken viser nøyaktig", "resultatet er sikkert riktig", "modellen er virkeligheten"], "tiltak": "Diskuter modellantagelser eksplisitt ved oppstart av alle modelleringsoppgaver (f.eks. konstant vekstrate, ingen luftmotstand). La eleven vurdere gyldighetsområdet og sammenligne modellresultat med virkelige data der det er mulig."}, {"id": "KM402-M2", "beskrivelse": "Eleven presenterer alle matematiske løsninger uten å vurdere dem opp mot konteksten: aksepterer f.eks. negativt antall personer, en lengde lik −5 m eller et tidspunkt som er langt i fremtiden som gyldige svar.", "nokkelord": ["x = −3 er svaret", "begge løsninger er gyldige", "svaret er negativt men ok", "x kan godt være negativ her"], "tiltak": "Still eksplisitt spørsmålet «Er dette rimelig i konteksten?» og krev at eleven skriver en setning som begrunner om løsningen aksepteres. Bygg en vane med å tolke, ikke bare beregne."}], "KM399": [{"id": "KM399-M1", "beskrivelse": "Eleven bruker x som variabel uten å definere hva x representerer, noe som gjør det umulig å tolke svaret eller kontrollere at beregningen er korrekt i kontekst. Dette er særlig problematisk ved sammensatte tekstoppgaver.", "nokkelord": ["la x = ...", "x er svaret", "x er antall", "x er prisen"], "tiltak": "Krev alltid at første trinn i løsningen er en presis variabeldefinisjon med enhet (f.eks. 'la x = prisen per kg i kroner'). Vis at denne presisjonen gjør det mulig å sette opp formelen riktig og kontrollere svaret."}, {"id": "KM399-M2", "beskrivelse": "Eleven ignorerer eller blander enheter, f.eks. legger sammen kilometer og meter uten konvertering, eller oppgir svar uten enhet. Manglende enhetshåndtering er en gjennomgående svakhet i matematisk tekstforståelse.", "nokkelord": ["km og m er det samme", "enhet spiller ingen rolle", "glemte å skrive enhet", "kan bare legge dem sammen"], "tiltak": "Bruk dimensjonsanalyse eksplisitt og la eleven alltid skrive enhet bak hvert tall i løsningsoppsettet. Vis eksempler der manglende konvertering gir meningsløst eller farlig galt svar (f.eks. dobbel enhetskonverteringsfeil i Mars Climate Orbiter)."}], "KM446": [{"id": "KM446-M1", "beskrivelse": "Eleven forveksler eksponentialfunksjon f(x) = a·bˣ (variabelen er i eksponenten) og potensfunksjon f(x) = a·xⁿ (variabelen er basen), og bruker begge typenavn upresist eller om hverandre.", "nokkelord": ["x i andre er eksponentiell", "2 opphøyd i x er en potensfunksjon", "eksponent betyr eksponentiell", "potens og eksponentiell er det samme"], "tiltak": "Sammenlign grafene til f(x) = 2ˣ og g(x) = x² i samme koordinatsystem med GeoGebra. Fremhev spørsmålet: «Hva er variabelen – basen eller eksponenten?» og la eleven klassifisere en rekke funksjonsuttrykk."}, {"id": "KM446-M2", "beskrivelse": "Eleven kansellerer feil i rasjonale uttrykk ved å «stryke» et additivt ledd fra teller og nevner: forenkler (x² + 4)/x til x + 4 ved å dele bare det første leddet i telleren på x.", "nokkelord": ["del hvert ledd på x", "stryk x fra teller og nevner", "(x^2 + 4)/x = x + 4", "del begge med x"], "tiltak": "Vis at forenkling krever at faktoren er en felles faktor for hele telleren. La eleven sjekke med x = 2: (4 + 4)/2 = 4, men 2 + 4 = 6 ≠ 4. Sammenlign med det korrekte (x² + 4x)/x = x + 4 der x faktisk er en felles faktor."}, {"id": "KM446-M3", "beskrivelse": "Eleven tror alle polynomfunksjoner vokser mot +∞ for store x (monoton vekst mot høyre), og forstår ikke at odde/like grad og fortegnet på ledende koeffisient bestemmer endeoppførselen («end behavior»).", "nokkelord": ["alle polynomer vokser til høyre", "grafen stiger alltid", "polynomgrafen ser alltid lik ut", "går alltid opp for stor x"], "tiltak": "Sammenlign grafene til x², −x², x³ og −x³ og la eleven formulere regelen selv: hvilken rolle spiller graden og fortegnet på høyeste koeffisient? Bruk tabellverdier for store positive og negative x-verdier for å synliggjøre mønsteret."}], "KM401": [{"id": "KM401-M1", "beskrivelse": "Eleven forveksler gjennomsnittlig vekstfart (sekantens stigningstall over et intervall) og momentan vekstfart (tangentens stigningstall i ett punkt), og tror de alltid gir samme verdi. Dette er en grunnleggende konseptuell feil dokumentert i Orton (1983) og Tall (1992).", "nokkelord": ["vekstfarten er den samme", "stigningstall i punktet er det samme som over intervallet", "gjennomsnitt og momentan er likt", "sekant og tangent er samme"], "tiltak": "Bruk GeoGebra til å animere sekantlinjen idet Δx → 0 og vis at den nærmer seg tangentlinjen. La eleven beregne gjennomsnittlig vekstfart for stadig mindre intervaller rundt ett punkt og observere at verdiene stabiliserer seg mot en grenseverdi."}, {"id": "KM401-M2", "beskrivelse": "Eleven tror derivasjonsregelen for produkt er (f·g)' = f'·g' – altså at den deriverte av et produkt er produktet av de deriverte. Forskning viser at denne feilen er svært vanlig og oppstår ved overoverføring av addisjonsregelen (f + g)' = f' + g'.", "nokkelord": ["deriver hvert faktor", "f' ganger g' er riktig", "gang de deriverte", "deriv av produkt er produkt av deriverte"], "tiltak": "Regn ut (x · x)' = (x²)' = 2x og sammenlign med 1 · 1 = 1: tydelig feil. Vis produktregelen (f·g)' = f'g + fg' og la eleven verifisere den for enkle produkter som x · sin x."}, {"id": "KM401-M3", "beskrivelse": "Eleven overfører egenskapen til en geometrisk tangent (berøringslinje til en sirkel) til tangentlinjer til kurver, og tror tangentlinjen aldri kan skjære kurven i andre punkter. Tall (1992) beskriver dette som en «prototypisk feiloppfatning» om tangenter.", "nokkelord": ["tangent bare rører", "tangent krysser aldri kurven", "berøringspunkt er det eneste skjæringspunktet", "tangent kan ikke gå gjennom kurven"], "tiltak": "Vis grafen til f(x) = x³ og tangentlinjen i x = 0: tangenten y = 0 skjærer kurven i (0, 0). La eleven finne andre eksempler med GeoGebra. Diskuter at tangentlinjens definisjon via grenseverdi er mer generell enn i sirkeltilfellet."}], "KM398": [{"id": "KM398-M1", "beskrivelse": "Eleven glemmer å inkludere plassholderkoeffisienter (0) for manglende potenser ved polynomdivisjon: behandler x³ + 1 som om det mangler x²- og x-leddet er irrelevant, noe som gir feil oppsett og feil resultat.", "nokkelord": ["x^3 + 1 har ingen x^2", "hopper over manglende ledd", "glemte x^2 og x-leddet", "det er bare to ledd i telleren"], "tiltak": "Krev at eleven alltid skriver polynomet i fullstendig standardform med alle ledd inkludert med eksplisitt 0-koeffisient: x³ + 0·x² + 0·x + 1 – før divisjonen starter. Demonstrer hva som skjer om man hopper over."}, {"id": "KM398-M2", "beskrivelse": "Eleven tror at polynomdivisjon med (x − a) alltid går opp uten rest, og sjekker ikke om a faktisk er et nullpunkt av polynomet før den konkluderer med at (x − a) er en faktor.", "nokkelord": ["x-a er alltid faktor", "deler alltid opp i faktorer", "resten er null selvfølgelig", "x-2 er alltid en faktor"], "tiltak": "La eleven dividere f(x) = x² + x + 1 med (x − 1) og se at resten er 3 ≠ 0. Koble til faktorteoremeret: (x − a) er faktor i f(x) hvis og bare hvis f(a) = 0. La eleven alltid sjekke f(a) før de starter divisjonen."}], "KM394": [{"id": "KM394-M1", "beskrivelse": "Eleven ser sinus og cosinus utelukkende som sideforhold i rettvinklet trekant og klarer ikke å anvende definisjonene for vinkler større enn 90° eller bruke dem i vilkårlige trekanter og som matematiske funksjoner.", "nokkelord": ["sinus er bare i rettvinklet trekant", "kan bare bruke sinus hvis det er 90 grader", "sinus er motstående over hypotenus alltid", "cos og sin bare for spiss vinkel"], "tiltak": "Introduser enhetssirkelen: definer cos θ og sin θ som x- og y-koordinaten til punktet på sirkelen med vinkel θ. Vis at dette stemmer med sideforholdsdefinisjonen for 0° < θ < 90° og generaliser til alle vinkler."}, {"id": "KM394-M2", "beskrivelse": "Eleven distribuerer sinus over addisjon: tror at sin(A + B) = sin A + sin B. Dette er en av de hyppigst observerte feilene i trigonometriundervisning (Bressoud 2010; Markel 1982) og skyldes overoverføring av distribusjonsprinsippet fra aritmetikk.", "nokkelord": ["sin(a+b) = sin a + sin b", "fordel sinus over plusset", "sin(30+60) = sin30 + sin60", "sinus distribuerer"], "tiltak": "La eleven beregne sin(30° + 60°) = sin 90° = 1 og deretter sin 30° + sin 60° = 0,5 + 0,866 ≈ 1,366 ≠ 1. Diskuter at sinus ikke er en lineær funksjon og at distribusjon ikke gjelder her."}, {"id": "KM394-M3", "beskrivelse": "Eleven forveksler arcsin(x) (den inverse sinusfunksjonen) med 1/sin(x) (den reciproke), og tolker notasjonen sin⁻¹(x) som 'en over sinus x'.", "nokkelord": ["sin^(-1) er 1/sin", "invers er det samme som reciprok", "sin^-1(x) = 1/sin(x)", "minus en i eksponenten betyr dele"], "tiltak": "Forklar notasjonstvetydigheten: f⁻¹ betyr invers funksjon, ikke reciprok. (sin x)⁻¹ = 1/sin x, men sin⁻¹(x) = arcsin(x). Bruk konsekvent notasjonen arcsin for inversene og la eleven verifisere: sin(arcsin(0,5)) = 0,5."}], "KM393": [{"id": "KM393-M1", "beskrivelse": "Eleven tror sinussetningen og cosinussetningen bare gjelder for spisse trekanter og vegrer seg for å bruke dem i trekanter med stump vinkel, fordi bevisene de har sett typisk tegner høydefoten inne i trekanten.", "nokkelord": ["bare for spisse trekanter", "stump vinkel ugyldig", "setningen gjelder ikke her", "fungerer ikke med stump vinkel"], "tiltak": "Gjennomfør beviset eksplisitt for tilfellet med stump vinkel ved å vise at høydefoten faller utenfor trekanten. La eleven sjekke setningene numerisk for en konkret stump trekant for å overbevise seg om at de gjelder."}, {"id": "KM393-M2", "beskrivelse": "Eleven velger feil setning for den gitte informasjonen: bruker cosinussetningen der sinussetningen er enklere og mer direkte, eller omvendt – spesielt ved tilfellet to sider og ikke-inkludert vinkel (SSA) der begge kan virke aktuelle.", "nokkelord": ["bruker cosinus alltid", "vet ikke hvilken setning", "prøver begge", "bruker sinus alltid"], "tiltak": "Lag en systematisk beslutningstabell: SSS og SAS → cosinussetning; AAS, ASA og SSA → sinussetning (SSA med tvetydighetssjekk). La eleven øve på å klassifisere oppgaven før de starter beregningen."}], "KM409": [{"id": "KM409-M1", "beskrivelse": "Eleven overser det tvetydige tilfellet (SSA): finner bare én trekant der det eksisterer to geometrisk mulige løsninger (én med spiss og én med stump vinkel), fordi kalkulatoren som standard returnerer verdien i [0°, 90°].", "nokkelord": ["bare én løsning", "én trekant er mulig", "glemte den andre trekanten", "sinus gir bare ett svar"], "tiltak": "Vis grafisk at en gitt side og en ikke-inkludert vinkel kan korrespondere til to ulike trekanter. La eleven tegne begge løsningene for hånd eller i GeoGebra, og undersøk systematisk om den stumpe vinkelen (180° − kalkulatorsvaret) gir en gyldig trekant."}, {"id": "KM409-M2", "beskrivelse": "Eleven blander grader og radianer: legger inn gradmål i kalkulator innstilt på radianmodus (eller omvendt) og får tilsynelatende rimelige, men gale svar uten å oppdage feilen.", "nokkelord": ["grader og radianer", "kalkulator i feil modus", "satt til radianer men brukte grader", "trodde det var riktig"], "tiltak": "Etabler rutine: alltid sjekk kalkulatormodus før trigonometriske beregninger. Sammenlign sin(30°) ≈ 0,5 med sin(30 rad) ≈ −0,988 og vis at disse er svært ulike. Diskuter at det er lett å oppdage feilen ved å kontrollere at svaret er i intervallet [−1, 1] for sinus/cosinus og at lengder er positive."}]}, "kw": {"formuler": ["KM403"], "algoritm": ["KM403"], "tenkning": ["KM403"], "probleml": ["KM400", "KM403"], "verktøy": ["KM397", "KM403"], "programm": ["KM403"], "forstå": ["KM395"], "utvikle": ["KM395"], "variable": ["KM397"], "størrels": ["KM397"], "ligninge": ["KM398", "KM404"], "lignings": ["KM404"], "tenkemåt": ["KM404"], "forklare": ["KM396", "KM398", "KM402"], "forskjel": ["KM396"], "mellom": ["KM396", "KM400"], "identite": ["KM396"], "ligning": ["KM396"], "algebrai": ["KM396", "KM398"], "uttrykk": ["KM396", "KM398"], "funksjon": ["KM396", "KM398", "KM446"], "andregra": ["KM400"], "kvadrats": ["KM400"], "drøfte": ["KM398", "KM402"], "modellen": ["KM402"], "gyldige": ["KM402"], "tekster": ["KM399"], "beregnin": ["KM399"], "analyser": ["KM399"], "beskrive": ["KM446"], "polynomf": ["KM446"], "rasjonal": ["KM446"], "eksponen": ["KM446"], "potensfu": ["KM446"], "gjennoms": ["KM401"], "momentan": ["KM401"], "vekstfar": ["KM401"], "konkrete": ["KM401"], "derivert": ["KM401"], "polynomd": ["KM398"], "omskrive": ["KM398"], "definisj": ["KM394"], "cosinus": ["KM393", "KM394"], "tangens": ["KM394"], "trigonom": ["KM394", "KM409"], "lengder": ["KM394", "KM409"], "vinkler": ["KM394", "KM409"], "arealer": ["KM394", "KM409"], "vilkårli": ["KM394"], "trekante": ["KM394"], "begrunne": ["KM393"], "arealset": ["KM393"], "sammensa": ["KM409"], "teoretis": ["KM409"]}, "loop": {"goal": "KM404", "goalText": "utforske strategier for å løse ligninger, ligningssystemer og ulikheter og argumentere for tenkemåtene sine", "answers": ["en elev skrev: gang begge sider med minus", "en elev skrev: finn x i den første", "dette svaret viser god forstaelse uten feil", "riktig fremgangsmate og korrekt svar her"]}, "status": "UTKAST v0 (agent-generert, ma laerer-valideres)"}, "Matematikk 2P": {"fag": "Matematikk 2P", "loep": "Praktisk", "aar": "Vg2", "farge": "#13a10e", "sett": "KV46", "antall": 7, "plan": {"perioder": [{"termin": "Term "KM450", "tekst": "vurdere valg knyttet til personlig økonomi og reflektere over konsekvenser av å ta opp lån og å bruke kredittkort", "kjerne": ["Modellering og anvendingar", "Resonnering og argumentasjon"], "strand": "okonomi"}, {"kode": "KM451", "tekst": "analysere og presentere funn i datasett fra lokalsamfunn og media", "kjerne": ["Modellering og anvendingar", "Resonnering og argumentasjon"], "strand": "statistikk"}, {"kode": "KM452", "tekst": "bruke og vurdere valg av hensiktsmessige sentralmål og spredningsmål for statistisk datamateriale", "kjerne": ["Resonnering og argumentasjon", "Representasjon og kommunikasjon"], "strand": "statistikk"}, {"kode": "KM453", "tekst": "utforske og forklare hvordan formlikhet, målestokk og egenskaper ved geometriske figurer kan brukes i beregninger og i praktisk arbeid", "kjerne": ["Utforsking og problemløysing", "Representasjon og kommunikasjon"], "strand": "geometri"}], "tax": {"KM447": [{"id": "VPROS-01", "beskrivelse": "Elever adderer vekstfaktorer ved sammensatt prosentvis vekst i stedet for å multiplisere dem, f.eks. konkluderer at 10 % vekst etterfulgt av 5 % vekst gir 15 % samlet vekst.", "nokkelord": ["legger sammen vekstratene", "10% + 5% = 15%", "adderer prosentene", "summen av vekstene"], "tiltak": "Vis med et konkret beløp: 1000 kr × 1,10 × 1,05 = 1155 kr (15,5 %), ikke 1150 kr (15 %). Bruk regneark til å vise effekten over mange perioder og tydeliggjøre den sammensatte vekstens natur."}, {"id": "VPROS-02", "beskrivelse": "Elever bruker feil grunnlag ved prosentberegning, f.eks. beregner prosentdelen av sluttverdien i stedet for startverdien ved tilbakeregning («omvendt prosentregning»).", "nokkelord": ["tok prosent av sluttverdien", "beregnet av ny pris", "brukte ny verdi som grunnlag", "delte på feil tall"], "tiltak": "Bruk vekstfaktormetoden systematisk: ny verdi = gammel verdi × vekstfaktor, løs alltid for gammel verdi ved å dele på vekstfaktoren. Understrek at grunnlaget er den opprinnelige verdien."}], "KM448": [{"id": "INDEKS-01", "beskrivelse": "Elever trekker KPI-veksten fra nominell lønn i stedet for å justere med forholdet mellom indeksene (subtraksjonslogikk brukes der divisjon er riktig).", "nokkelord": ["trekker fra KPI", "minus prisveksten", "nominell minus 3%", "trekker fra inflasjonen"], "tiltak": "Vis formelen: reallønn = nominell lønn × (KPI_basisår / KPI_aktuelt år). Sammenlign subtraksjonsresultatet og divisjonsresultatet på et konkret eksempel og se at de gir ulike svar ved store indeksendringer."}, {"id": "INDEKS-02", "beskrivelse": "Elever tror at en lønnsøkning som tilsvarer inflasjonen betyr reell kjøpekraftvekst (blander nominell og reell lønn).", "nokkelord": ["fikk mer i lønn", "tjener mer", "lønn økte med 3%", "reallønn økte", "nominell er det samme"], "tiltak": "Bruk et scenario: «Lønnen din økte med 3 %, men prisene økte med 4 %. Hva skjedde med kjøpekraften?» La elever beregne og diskutere at reallønn falt selv om nominell lønn steg."}, {"id": "INDEKS-03", "beskrivelse": "Elever blander bruttoinntekt og nettoinntekt og planlegger privatøkonomi ut fra bruttolønn.", "nokkelord": ["tjener 500 000", "brutto er det jeg bruker", "trekker ikke fra skatt", "bruker bruttolønn i budsjettet"], "tiltak": "Bruk et realistisk lønnsslipper med skattetrekk, trygdeavgift og eventuelt fagforeningskontingent. La elever lage et enkelt privatøkonomibudsjett basert på nettobeløpet."}], "KM449": [{"id": "LIG-01", "beskrivelse": "Elever gjør fortegnsfeil ved transponering: de «flytter et ledd over» uten å skifte fortegn.", "nokkelord": ["flytta over", "tok med seg plusset", "glemte å skifte fortegn", "uten fortegn", "la til i stedet for å trekke fra"], "tiltak": "Bruk balansemetaforen konsekvent: begge sider av ligningen er en vektskål. Enhver operasjon gjøres likt på begge sider. Unngå metaforen «flytte over» – den kamuflerer den matematiske handlingen."}, {"id": "LIG-02", "beskrivelse": "Elever glemmer å snu ulikhetsfortegnet ved multiplikasjon eller divisjon med et negativt tall.", "nokkelord": ["glemte å snu", "snudde ikke ulikheten", "−2x > 6 gir x > −3", "deler på minus to", "ulikheten forblir lik"], "tiltak": "Demonstrer med konkrete tall: 2 < 4, multipliser begge sider med −1: −2 > −4. La elever oppdage og formulere regelen selv, og øv med mange eksempler."}], "KM450": [{"id": "OKON-01", "beskrivelse": "Elever forveksler nominell og effektiv rente og tror at det lånet som har lavest oppgitt (nominell) rente alltid er billigst.", "nokkelord": ["lavest rente er billigst", "bare ser på nominell", "nominell rente er det som teller", "ignorerer effektiv rente"], "tiltak": "Sammenlign to lån: ett med lav nominell rente og hyppige terminbetalinger, ett med høyere nominell rente og færre terminer. Beregn effektiv rente for begge og sammenlign totalt tilbakebetalt beløp."}, {"id": "OKON-02", "beskrivelse": "Elever tror at minimumsbetaling på kredittkort nedbetaler gjelden raskt, uten å ta hensyn til at høy rente akkumulerer seg raskere enn avdraget.", "nokkelord": ["betaler minimumsbeløpet", "nok å betale minimum", "betaler litt hver mnd", "tar ikke lang tid å betale ned"], "tiltak": "Bruk regneark for å simulere et kredittkortlån på f.eks. 20 000 kr med kun minimumsbetaling. La elever se totalt antall år og total rentekostnad. Kontraster med full innbetaling hver måned."}, {"id": "OKON-03", "beskrivelse": "Elever forveksler annuitetslån og serielån: de tror terminbeløpet er konstant i serielån, eller at avdraget er konstant i annuitetslån.", "nokkelord": ["samme beløp hver gang", "konstant terminbeløp er serielån", "avdraget er likt i annuitet", "annuitet og serie er det samme"], "tiltak": "Bygg en nedbetalingstabell for begge lånetyper med samme beløp, rente og løpetid. La elever sammenligne terminbeløp, avdragsdel og rentedel over tid, og diskutere fordeler og ulemper ved begge."}], "KM451": [{"id": "DATA-01", "beskrivelse": "Elever blander korrelasjon og kausalitet: de konkluderer at én variabel forårsaker en annen fordi de er statistisk korrelerte.", "nokkelord": ["fordi", "årsaken er", "fører til", "beviser at", "viser at det er slik", "skyldes"], "tiltak": "Bruk morsomme spuriøse korrelasjoner (f.eks. iskremssalg og drukningsulykker på sommeren) for å vise at statistisk sammenheng ikke er det samme som årsakssammenheng. Diskuter bakenforliggende variabler."}, {"id": "DATA-02", "beskrivelse": "Elever fjerner automatisk uteliggere uten å vurdere om de er reelle observasjoner eller målefeil.", "nokkelord": ["tok bort uteliggeren", "fjernet det avvikende punktet", "ignorerte den høye verdien", "regnet uten det punktet"], "tiltak": "Diskuter hva en uteligger kan fortelle: er det en målefeil, en spesiell hendelse, eller den mest interessante observasjonen? Vis at konteksten avgjør om uteliggeren skal beholdes eller undersøkes nærmere."}], "KM452": [{"id": "STAT-01", "beskrivelse": "Elever bruker gjennomsnittet ukritisk som det beste sentralmålet, også når fordelingen er sterkt skjev eller inneholder tydelige uteliggere.", "nokkelord": ["regnet ut gjennomsnittet", "brukte gjennomsnitt", "middelverdi er alltid best", "alltid bruke gjennomsnittet"], "tiltak": "Vis et datasett med én sterk uteligger (f.eks. inntektsfordeling med én svært høylønnet person). Beregn gjennomsnitt og median og diskuter hvilken størrelse som representerer «den typiske» verdien best."}, {"id": "STAT-02", "beskrivelse": "Elever tror at et høyere gjennomsnitt nødvendigvis innebærer høyere standardavvik (konfunderer sentraltendens og spredning).", "nokkelord": ["høyere snitt betyr mer spredning", "større gjennomsnitt gir større variasjon", "stor spredning fordi gjennomsnittet er høyt"], "tiltak": "Vis to datasett: ett med lavt gjennomsnitt og høy spredning, og ett med høyt gjennomsnitt og lav spredning. La elever beregne begge mål og sammenligne for å se at de er uavhengige egenskaper."}, {"id": "STAT-03", "beskrivelse": "Elever tror at medianen alltid er et av de faktiske datapunktene, selv når det er et partall antall observasjoner.", "nokkelord": ["medianen er et av tallene", "må velge ett tall fra lista", "medianen er 7 fordi det er i datasettet", "er ikke gjennomsnittet av de to midterste"], "tiltak": "Gi eksempler med partall antall observasjoner og beregn medianen som gjennomsnittet av de to midterste verdiene. Øv med mange ulike datasett og vari antall observasjoner."}], "KM453": [{"id": "GEO-01", "beskrivelse": "Elever tror at en fordobling av alle sidelengder gir dobbelt så stort areal (forstår ikke kvadratisk skalering).", "nokkelord": ["arealet dobles", "dobbel sidelengde gir dobbelt areal", "to ganger så stort", "ganger arealet med 2"], "tiltak": "Tegn konkret: kvadrat med side 2 (areal 4) og kvadrat med side 4 (areal 16). La elever oppdage at arealet firedobles. Generaliser: skalafaktor k for lengder gir k² for areal og k³ for volum."}, {"id": "GEO-02", "beskrivelse": "Elever feiltolker målestokken og tror at 1:50 000 betyr 1 cm tilsvarer 50 000 meter (mangler enhetsomregning).", "nokkelord": ["1 cm er 50 000 meter", "50 000 meter på kartet", "glemte å omregne til cm", "tok som meter direkte"], "tiltak": "Tren systematisk på enhetsomregning skritt for skritt: 1:50 000 betyr 1 cm = 50 000 cm = 500 m = 0,5 km. Skriv alle omregningssteg eksplisitt og sjekk svaret mot en fysisk lengde eleven kjenner."}, {"id": "GEO-03", "beskrivelse": "Elever antar at to trekanter er formlike fordi de har samme areal, uten å sjekke vinkellikhet og sidelengdeforhold.", "nokkelord": ["same areal betyr formlike", "arealet er likt så de er formlike", "like store er formlike", "formlike fordi likt areal"], "tiltak": "Vis to trekanter med samme areal men helt ulik form (f.eks. en spiss og en bred trekant). Definer formlikhet via vinkellikhet (og proporsjonale sider) – ikke via areal. La elever sjekke vinkler eksplisitt."}]}, "kw": {"forklare": ["KM447", "KM448", "KM453"], "prosent": ["KM447"], "prosentp": ["KM447"], "vekstfak": ["KM447"], "modeller": ["KM447"], "verktøy": ["KM447"], "mellom
