er av funksjoner som ikke er kontinuerlige", "kjerne": ["Modellering og anvendelser", "Resonnering og argumentasjon", "Representasjon og kommunikasjon"], "strand": "analyse"}, {"kode": "KM3138", "tekst": "utforske og forstå kombinatoriske forsøk med ordnede og uordnede utvalg", "kjerne": ["Utforsking og problemløsing", "Representasjon og kommunikasjon"], "strand": "kombinatorikk"}, {"kode": "KM3137", "tekst": "bruke digitale verktøy til å simulere og utforske utfall i stokastiske forsøk, og forstå begrepet stokastiske variabler", "kjerne": ["Modellering og anvendelser"], "strand": "sannsynlighet"}, {"kode": "KM3133", "tekst": "analysere et problem der sannsynlighet og kombinatorikk inngår, og bruke ulike strategier i problemløsingen", "kjerne": ["Utforsking og problemløsing", "Modellering og anvendelser", "Resonnering og argumentasjon", "Representasjon og kommunikasjon"], "strand": "sannsynlighet"}, {"kode": "KM3136", "tekst": "utforske og tolke binomiske og hypergeometriske fordelinger, og gi eksempler på reelle anvendelser av disse fordelingene", "kjerne": ["Utforsking og problemløsing", "Modellering og anvendelser"], "strand": "sannsynlighet"}], "tax": {"KM3132": [{"id": "S1-DAT-01", "beskrivelse": "Elever forveksler korrelasjon med kausalitet i samfunnsøkonomiske datasett: to variabler som korrelerer høyt tolkes umiddelbart som årsak–virkning.", "nokkelord": ["korrelasjon", "kausalitet", "spuriøs korrelasjon", "konfundering", "observasjonsdata"], "tiltak": "Vis klassiske eksempler på spuriøse korrelasjoner (f.eks. iskrem-salg og drukninger korrelerer med årstid). Diskuter konfunderingsvariabler og hva som kreves for å hevde kausalitet (kontrollert eksperiment, mekanisme, temporalitet)."}], "KM3135": [{"id": "S1-SPR-01", "beskrivelse": "Elever bruker tilnærmingstegn (≈) og likhetstegn (=) om hverandre, og oppfatter dem som ekvivalente i matematisk kommunikasjon. Dette fører til upresise resonnementer og kan skjule feil.", "nokkelord": ["likhetstegn", "tilnærming", "presisjon", "symbolbruk", "avrunding"], "tiltak": "Gjennomfør eksplisitte øvelser der elever selv skal velge riktig tegn og begrunne valget. Vis et tilfelle der bruk av = i stedet for ≈ fører til en feilaktig konklusjon i en kjede av beregninger."}], "KM3141": [{"id": "S1-DER-01", "beskrivelse": "Elever forveksler gjennomsnittlig vekstfart (sekantens stigningstall over et intervall) med momentan vekstfart (tangentens stigningstall i ett punkt). Orton (1983) fant dette blant de hyppigste misoppfatningene i differensialregning.", "nokkelord": ["gjennomsnittlig vekstfart", "momentan vekstfart", "sekant", "tangent", "intervall vs. punkt"], "tiltak": "Bruk dynamisk geometriverktøy (GeoGebra) der eleven ser sekanten nærme seg tangenten mens Δx → 0. Krev at elevene alltid angir om de beregner gjennomsnitts- eller momentan vekstfart og merker svaret med riktig enhet og fortolkning."}, {"id": "S1-DER-02", "beskrivelse": "Elever tror at f'(x) gir funksjonsverdien (høyden på grafen) i punktet x, ikke stigningstallet til tangenten. Feilen er dokumentert som en grunnleggende konfusjon mellom funksjon og dens deriverte (Zandieh 2000).", "nokkelord": ["derivert", "funksjonsverdi", "stigningstall", "tangent", "f(x) vs. f'(x)"], "tiltak": "Tegn alltid f(x) og f'(x) i separate koordinatsystem. Be elevene lese av f(2) og f'(2) for et konkret eksempel og forklare med ord hva hvert tall betyr i kontekst (f.eks. høyde vs. vekstrate i en biologisk modell)."}], "KM3143": [{"id": "S1-GRV-01", "beskrivelse": "Elever antar at grenseverdien alltid er lik funksjonsverdien: lim_{x→a} f(x) = f(a), uten å verifisere betingelsene. Dette er en direkte følge av at de fleste funksjoner elevene møter er kontinuerlige (Ferrini-Mundy & Graham 1994).", "nokkelord": ["grenseverdi", "funksjonsverdi", "kontinuitet", "hull i graf", "substitusjon"], "tiltak": "Bruk funksjoner med avgjørbart hull der grenseverdien eksisterer men funksjonsverdien ikke gjør det, f.eks. f(x) = (x²−1)/(x−1) ved x → 1. Krev alltid at elevene sjekker kontinuitetsbetingelsene før de setter inn."}, {"id": "S1-GRV-02", "beskrivelse": "Elever behandler uendelig (∞) som et konkret tall de kan sette inn i regneuttrykk og forventer entydige svar for former som ∞/∞ = 1 eller 0/0 = 0.", "nokkelord": ["uendelig", "ubestemtform", "0/0", "∞/∞", "grenseverdi"], "tiltak": "Vis to ulike grenser som begge gir '∞/∞' men har ulike svar (f.eks. lim x/x = 1 og lim x²/x = ∞). Forklar at ∞ symboliserer en prosess – ikke et tall – og introduser algebraisk omforming for å håndtere ubestemte former."}], "KM3140": [{"id": "S1-MOD-01", "beskrivelse": "Elever tolker den deriverte modellen som modellens faktiske verdi i stedet for dens øyeblikkelige vekstrate. F.eks. tolker de T'(t) = 3 som at temperaturen er 3 °C, ikke at den stiger med 3 °C per tidsenhet.", "nokkelord": ["derivert", "tolkning", "enhet", "vekstrate", "kontekst"], "tiltak": "Krev alltid at elevene skriver enheten til den deriverte (f.eks. °C/min, kr/stk) og formulerer en fullstendig setning om hva den deriverte betyr i den aktuelle konteksten. Sørg for at enheten hjelper dem til å skille mellom størrelse og endringsrate."}, {"id": "S1-MOD-02", "beskrivelse": "Elever tror at en modell som 'ser bratt ut' på grafen, alltid har stor derivert, uten å ta hensyn til akseskalering. Syntetisk vurdering av grafens visuelle helning overtrumfer korrekt beregning.", "nokkelord": ["akseskalering", "stigningstall", "visuell helning", "graf", "modell"], "tiltak": "Vis samme funksjon tegnet med ulike akseintervaller, der grafen ser enten flat eller bratt ut. Diskuter at den deriverte er et presist tall – ikke en visuell egenskap – og at det alltid må beregnes."}], "KM3139": [{"id": "S1-OPT-01", "beskrivelse": "Elever tror at f'(x₀) = 0 alltid gir et maksimums- eller minimumspunkt, og overser terrassepunkter. De glemmer at f'(x₀) = 0 er nødvendig, men ikke tilstrekkelig for ekstremum.", "nokkelord": ["kritisk punkt", "terrassepunkt", "andrederiverte", "fortegnskift", "nødvendig betingelse"], "tiltak": "Presenter f(x) = x³ som standardeksempel: f'(0) = 0, men x = 0 er et terrassepunkt. Krev alltid fortegnsanalyse av f'(x) rundt kritiske punkter eller bruk andrederiverte-testen, og gjennomgå begge metodene."}, {"id": "S1-OPT-02", "beskrivelse": "Elever glemmer å evaluere funksjonsverdiene i endepunktene ved optimalisering på et lukket intervall [a, b], og antar at det eneste kandidatpunktet er det indre kritiske punktet.", "nokkelord": ["endepunkt", "lukket intervall", "globalt maksimum", "globalt minimum", "kandidatpunkter"], "tiltak": "Innfør 'kandidatlisten': evaluer f i alle indre kritiske punkter OG i begge endepunkter a og b. Bruk eksempler der det globale ekstremumet faktisk befinner seg i et endepunkt."}], "KM3134": [{"id": "S1-LOG-04", "beskrivelse": "Elever behandler logaritmefunksjonen som lineær og antar at log(cx) = c·log(x) for alle konstanter c, i stedet for log(cx) = log(c) + log(x). Misforståelsen speiler en generell tendens til å lineærisere ikke-lineære funksjoner.", "nokkelord": ["linearitet", "logaritme", "proporsjonalitet", "log(cx)", "skaleringsregel"], "tiltak": "Tegn grafen til y = log(x) og fremhev konkaviteten. Beregn log(2·5) = log(10) = 1 og 2·log(5) ≈ 1,398 og sammenlign. Vis at kun log(c) + log(x) gir riktig svar."}, {"id": "S1-LOG-05", "beskrivelse": "Elever tror at logaritmen er definert for negative tall, f.eks. at log(−4) = −log(4). Misforståelsen skyldes sammenblanding med regelen log(1/x) = −log(x).", "nokkelord": ["definisjonsmengde", "negativ", "logaritme", "udefinert", "log(−x)"], "tiltak": "Gå tilbake til definisjonen: log_a(x) = y betyr a^y = x. Spør: hvilken potens av et positivt grunntall kan gi et negativt tall? Ingen. Vis grafen til y = ln(x) og at den stopper ved x = 0."}], "KM3122": [{"id": "S1-LOG-01", "beskrivelse": "Elever tror at log(a + b) = log(a) + log(b), og overfører additivitet til logaritmer analogt med multiplikasjonsregelen. Dette er en av de hyppigst dokumenterte logaritmefeilene (Matz 1982 om 'overgeneralisering av regler').", "nokkelord": ["addisjon", "logaritme", "feilregel", "log(a+b)", "overgeneralisering"], "tiltak": "La elevene beregne talleksempler: log(2 + 8) = log(10) = 1, mens log(2) + log(8) ≈ 1,204. Diskuter hvilken egenskap som faktisk gjelder (produktregelen) og spor feilen til blanding med log(a·b)."}, {"id": "S1-LOG-02", "beskrivelse": "Elever tror at x^a · x^b = x^(a·b) (multipliserer eksponentene) i stedet for å addere dem. Feilen stammer fra sammenblanding av potensreglene (a^m)^n = a^(m·n) og a^m · a^n = a^(m+n).", "nokkelord": ["eksponent", "potens", "multiplikasjonsregel", "addisjonsregel", "regneregel"], "tiltak": "Bruk konkrete talleksempler: 2² · 2³ = 4 · 8 = 32 = 2⁵, ikke 2⁶. Knytt til definisjonen av potens som gjentatt multiplikasjon og vis begge reglene side om side."}, {"id": "S1-LOG-03", "beskrivelse": "Elever tror at ln(x^n) = (ln x)^n – de forveksler 'logaritmen av en potens' med 'logaritmeverdien opphøyd i en potens'.", "nokkelord": ["ln", "potens", "logaritme", "eksponent", "rekkefølge"], "tiltak": "Skill tydelig mellom de to uttrykkene med numeriske eksempler: ln(2³) = 3·ln(2) ≈ 2,08, mens (ln 2)³ ≈ 0,33. Fremhev at regneregelen ln(xⁿ) = n·ln(x) gjelder eksponenten inne i logaritmen."}], "KM3142": [{"id": "S1-KON-01", "beskrivelse": "Elever tror at en funksjon er kontinuerlig i et punkt bare fordi den er definert der, uten å sjekke om grenseverdien eksisterer og er lik funksjonsverdien. Tall & Vinner (1981) viste at 'concept image' av kontinuitet oftest er en tegning uten hull – ikke de tre formelle betingelsene.", "nokkelord": ["definert", "kontinuitet", "grenseverdi", "stykkevis", "funksjonens verdi"], "tiltak": "Presenter stykkevis definerte funksjoner der f(a) eksisterer, men lim_{x→a} f(x) ≠ f(a). Gå eksplisitt gjennom de tre kontinuitetskravene som en sjekkliste: (1) f(a) definert, (2) grenseverdien eksisterer, (3) de er like."}, {"id": "S1-KON-02", "beskrivelse": "Elever forveksler deriverbarhet og kontinuitet – de tror en kontinuerlig funksjon nødvendigvis er deriverbar overalt, og omvendt.", "nokkelord": ["deriverbar", "kontinuerlig", "knekk", "absoluttverdifunksjon", "implikasjon"], "tiltak": "Bruk f(x) = |x| som standardeksempel: kontinuerlig, men ikke deriverbar i x = 0 (venstre- og høyrederiverte er ulike). Diskuter implikasjonsretningen: deriverbar ⟹ kontinuerlig, men ikke omvendt."}], "KM3138": [{"id": "S1-KOM-01", "beskrivelse": "Elever forveksler ordnede og uordnede utvalg: de bruker permutasjonsformelen der kombinasjon er riktig og omvendt. Feilen er grundig dokumentert i forskning på kombinatorisk tenkning (English 1991, Batanero et al. 1997).", "nokkelord": ["permutasjon", "kombinasjon", "ordnet", "uordnet", "rekkefølge"], "tiltak": "Tren elevene til alltid å stille spørsmålet 'Betyr rekkefølgen noe her?' som første steg. Bruk kontrasterende eksempler: tre bøker på hylle (ordnet) vs. tre kort trukket fra en kortstokk (uordnet). Krev begrunnelse for valg av formel."}, {"id": "S1-KOM-02", "beskrivelse": "Elever tar ikke hensyn til om trekningen skjer med eller uten tilbakelegging, og velger feil telleformel for utvalget.", "nokkelord": ["tilbakelegging", "uten tilbakelegging", "utvalg", "kombinatorikk", "modellforutsetning"], "tiltak": "Gjennomfør parallelle eksempler – samme scenario med og uten tilbakelegging – og la elevene telle alle mulige utfall. Understreke at dette er en forutsetning man må avklare eksplisitt i oppgaveteksten."}], "KM3137": [{"id": "S1-STO-01", "beskrivelse": "Spillerfeil (gambler's fallacy): elever tror at tidligere utfall i uavhengige forsøk påvirker sannsynligheten for fremtidige utfall (f.eks. 'nå er det lenge siden kron, så det er større sjanse for kron nå'). Klassisk dokumentert av Kahneman & Tversky (1972) og Tversky & Kahneman (1974).", "nokkelord": ["spillerfeil", "uavhengige hendelser", "gambler's fallacy", "serietenkning", "myntkast"], "tiltak": "Simuler lange sekvenser av myntkast digitalt og vis at frekvensen av kron nærmer seg 0,5 uavhengig av forutgående sekvenser. Gjennomgå definisjonen av statistisk uavhengighet med presist språk og diskuter det psykologiske grunnlaget for feilen."}, {"id": "S1-STO-02", "beskrivelse": "Representativitetsheuristikk: elever tror at et lite utvalg alltid skal reflektere populasjonsparametrene nøyaktig – 'lov om de små tall' (Kahneman & Tversky 1971). F.eks. forventer de omtrent 5 kron av 10 kast og er overrasket over 3 eller 7.", "nokkelord": ["representativitet", "lite utvalg", "heuristikk", "variabilitet", "lov om store tall"], "tiltak": "Gjennomfør simuleringseksperimenter med ulike utvalgsstørrelser (n = 10, 50, 500) og vis histogram for utvalgsgjennomsnittet. Diskuter at det kun er for store utvalg at frekvensen stabiliserer seg nær den teoretiske sannsynligheten (lov om store tall)."}], "KM3133": [{"id": "S1-SANN-01", "beskrivelse": "Elever multipliserer sannsynligheter P(A)·P(B) for å finne P(A∩B) uten å kontrollere om hendelsene faktisk er uavhengige. Forskning viser at uavhengighetsbegrepet er et av de vanskeligste i sannsynlighetsregning (Fischbein & Gazit 1984).", "nokkelord": ["uavhengighet", "multiplikasjonsregel", "betinget sannsynlighet", "avhengige hendelser", "P(A∩B)"], "tiltak": "Presenter trekk uten tilbakelegging fra en urne som kjerneeksempel på avhengige hendelser. Beregn P(A∩B) på to måter: telleregel og produktregel. Vis eksplisitt at P(A∩B) ≠ P(A)·P(B) og koble til betinget sannsynlighet."}, {"id": "S1-SANN-02", "beskrivelse": "Elever forveksler P(A|B) med P(B|A) – inversjonsfeil. Dette er særlig kritisk i medisinske og juridiske tolkningssammenhenger ('statsadvokaters feilslutning'). Dokumentert av Tversky & Kahneman (1983) via konjunksjonsfeilstudier.", "nokkelord": ["betinget sannsynlighet", "P(A|B)", "inversjonsfeil", "diagnostisk test", "sensitivitet"], "tiltak": "Bruk medisinske testeksempler: sensitivitet P(positiv test | syk) vs. positiv prediktiv verdi P(syk | positiv test). Vis at disse kan være svært ulike, spesielt ved lav prevalens. La elevene beregne begge ved hjelp av Bayes' teorem og et frekvenstre."}, {"id": "S1-SANN-03", "beskrivelse": "Likesannsynlighetsbias (equiprobability bias, Lecoutre 1992): elever tror at alle utfall alltid er like sannsynlige fordi de er diskrete alternativer. F.eks. at sannsynligheten for sum 2 og sum 7 ved to terninger er like stor.", "nokkelord": ["likesannsynlighet", "equiprobability bias", "utfall", "uniform fordeling", "terningsum"], "tiltak": "Lag et systematisk utfallsrom for sum av to terninger (6×6 tabell) og tell gunstige utfall for hver sum. Vis at sum 7 har 6 gunstige utfall og sum 2 bare 1. Krev alltid at elevene konstruerer utfallsrommet eksplisitt."}], "KM3136": [{"id": "S1-FORD-01", "beskrivelse": "Elever anvender binomisk fordeling ved trekning uten tilbakelegging fra en liten populasjon, der sannsynligheten p endrer seg for hvert trekk – og hypergeometrisk fordeling er korrekt modell.", "nokkelord": ["binomisk", "hypergeometrisk", "uten tilbakelegging", "liten populasjon", "modellvalg"], "tiltak": "Gjennomgå forutsetningene for binomisk fordeling (faste og uavhengige forsøk, konstant p) og kontrastér med hypergeometrisk (endelig populasjon, uten tilbakelegging). Bruk urneeksempler med liten populasjon og vis at p endrer seg etter hvert trekk."}, {"id": "S1-FORD-02", "beskrivelse": "Elever tror at forventningsverdien E(X) til en diskret fordeling alltid er et mulig utfall. F.eks. at B(3, 0,5) gir E(X) = 1,5 suksesser, som ikke er et mulig utfall av X.", "nokkelord": ["forventningsverdi", "mulig utfall", "diskret fordeling", "vektet gjennomsnitt", "B(n,p)"], "tiltak": "Beregn E(X) = n·p for konkrete binomiske eksempler der resultatet ikke er et heltall. Definer forventningsverdi eksplisitt som et vektet langtidsgjennomsnitt over mange gjentagelser – ikke nødvendigvis et observerbart enkeltutfall."}]}, "kw": {"planlegg": ["KM3132"], "gjennomf": ["KM3132"], "selvsten": ["KM3132"], "arbeid": ["KM3132"], "datas on", "Representasjon og kommunikasjon", "Abstraksjon og generalisering"], "strand": "rekker"}, {"kode": "KM3130", "tekst": "utforske rekursive sammenhenger ved å bruke programmering og presentere egne framgangsmåter", "kjerne": ["Utforsking og problemløsing", "Resonnering og argumentasjon", "Representasjon og kommunikasjon", "Abstraksjon og generalisering"], "strand": "rekker"}, {"kode": "KM3126", "tekst": "forstå definisjonen av det bestemte integralet og anvende integralet til å analysere funksjoner", "kjerne": ["Modellering og anvendelser", "Resonnering og argumentasjon"], "strand": "integrasjon"}, {"kode": "KM3125", "tekst": "gjøre rede for analysens fundamentalteorem og gjøre rede for konsekvenser av teoremet", "kjerne": ["Modellering og anvendelser", "Resonnering og argumentasjon"], "strand": "integrasjon"}, {"kode": "KM3129", "tekst": "analysere og tolke ulike funksjoner ved å bruke derivasjon og integrasjon", "kjerne": ["Resonnering og argumentasjon"], "strand": "integrasjon"}, {"kode": "KM3127", "tekst": "modellere og analysere eksponentiell og logistisk vekst i reelle datasett", "kjerne": ["Modellering og anvendelser", "Representasjon og kommunikasjon"], "strand": "modellering"}, {"kode": "KM3145", "tekst": "forstå begrepene forventningsverdi, varians og standardavvik, og bruke disse størrelsene til å tolke stokastiske variabler", "kjerne": ["Resonnering og argumentasjon", "Representasjon og kommunikasjon"], "strand": "statistikk"}, {"kode": "KM3124", "tekst": "simulere utfall i, utforske og tolke ulike statistiske fordelinger, og gi eksempler på reelle anvendelser av disse fordelingene", "kjerne": ["Modellering og anvendelser", "Resonnering og argumentasjon"], "strand": "statistikk"}, {"kode": "KM3128", "tekst": "finne grensekostnader og grenseinntekter i økonomiske modeller, og gjøre rede for betydningen av disse størrelsene", "kjerne": ["Modellering og anvendelser", "Resonnering og argumentasjon"], "strand": "oekonomi"}, {"kode": "KM3123", "tekst": "argumentere for sentralgrensesetningen og utforske og tolke praktiske situasjoner ved hjelp av normalfordelingen", "kjerne": ["Utforsking og problemløsing", "Modellering og anvendelser", "Resonnering og argumentasjon", "Representasjon og kommunikasjon", "Abstraksjon og generalisering"], "strand": "normalfordeling"}, {"kode": "KM3144", "tekst": "gjennomføre hypotesetesting i reelle datasett og tolke resultatet", "kjerne": ["Modellering og anvendelser", "Resonnering og argumentasjon"], "strand": "hypotesetesting"}], "tax": {"KM3131": [{"id": "S2-SER-01", "beskrivelse": "Elever forveksler tallfølge og rekke: de tror at rekken er det samme som tallfølgen (leddene), ikke summen av dem. Dokumentert i forskning på studenters forståelse av uendelige prosesser (Tall 1992).", "nokkelord": ["rekke", "følge", "sum", "ledd", "∑-notasjon"], "tiltak": "Bruk konsekvent notasjon: {a_n} for følgen, S_n = Σ_{k=1}^{n} a_k for rekken. Beregn begge for et konkret eksempel (f.eks. a_n = 2^{−n}) og fremhev at S_n er et tall, ikke en liste."}, {"id": "S2-SER-02", "beskrivelse": "Elever tror at a_n → 0 er tilstrekkelig betingelse for at rekken Σa_n konvergerer. Dette er kun en nødvendig betingelse; den harmoniske rekken Σ1/n er et kanonisk moteksempel (Cauchy).", "nokkelord": ["konvergens", "harmonisk rekke", "leddene går mot null", "divergens", "nødvendig betingelse"], "tiltak": "Vis at den harmoniske rekken Σ1/n divergerer ved å gruppere ledd (Cauchy-argumentet): 1 + 1/2 + (1/3+1/4) + (1/5+…+1/8) + … > 1 + 1/2 + 1/2 + 1/2 + … Diskuter eksplisitt skillet mellom nødvendige og tilstrekkelige betingelser for konvergens."}], "KM3130": [{"id": "S2-RES-01", "beskrivelse": "Elever forveksler rekursiv og eksplisitt formel: de tror at en rekursiv formel kan brukes til å beregne a_n direkte ved å sette inn n, uten å iterere steg for steg.", "nokkelord": ["rekursiv", "eksplisitt", "iterasjon", "direkte beregning", "formeltype"], "tiltak": "La elevene beregne de fem første leddene i en rekke steg for steg med rekursiv formel, og sammenligne med direkte innsetting i en eventuell eksplisitt formel. Krev at begge formeltypene angis og at forskjellen forklares med ord."}, {"id": "S2-RES-02", "beskrivelse": "Off-by-one-feil: elever setter inn feil indeks i rekursive sammenhenger (f.eks. bruker a_n i stedet for a_{n−1}) eller glemmer å spesifisere startverdien a_1.", "nokkelord": ["indeks", "off-by-one", "rekursjon", "startverdi", "initialbetingelse"], "tiltak": "Krev alltid at elevene angir initialverdien (a_1 eller a_0) eksplisitt som en del av spesifikasjonen. La dem spore rekursjonen manuelt for de første tre leddene og sjekke mot et digitalt verktøy."}], "KM3126": [{"id": "S2-INT-01", "beskrivelse": "Elever tror at det bestemte integralet alltid er positivt fordi det representerer 'areal', og ignorerer at integralet er negativt for funksjoner under x-aksen. Misforståelsen er knyttet til en overfladisk areal-metafor (Orton 1983).", "nokkelord": ["areal", "negativt integral", "under x-aksen", "fortegn", "signert areal"], "tiltak": "Tegn en funksjon som er negativ på et delintervall, beregn det bestemte integralet og vis at det er negativt. Innfør terminologien 'signert areal' for integralet og 'geometrisk areal' for |∫f(x)dx|. Øv på oppgaver der disse er ulike."}, {"id": "S2-INT-02", "beskrivelse": "Elever forveksler ubestemt integral (familie av antideriverte med +C) og bestemt integral (et tall), og utelater integrasjonskonstanten eller integralgrensene.", "nokkelord": ["ubestemt integral", "bestemt integral", "integrasjonskonstant", "+C", "integralgrenser"], "tiltak": "Innfør konsekvent notasjon fra dag én: ∫f(x)dx = F(x)+C (ubestemt), og ∫_a^b f(x)dx = F(b)−F(a) (bestemt, et tall). Krev at elevene alltid angir grenser eller +C, og gi poeng for notasjonsbruk i vurderingssituasjoner."}], "KM3125": [{"id": "S2-FTK-01", "beskrivelse": "Elever har vanskeligheter med å anvende del 1 av fundamentalteoremet direkte: d/dx[∫_a^x f(t)dt] = f(x). De differensierer ofte F(x)−F(a) feil eller setter inn øvre grense feil.", "nokkelord": ["fundamentalteorem", "del 1", "derivasjon av integral", "øvre grense", "FTK"], "tiltak": "Øv eksplisitt på del 1: 'derivér integralet – sett inn den øvre grensen i integranden'. Bruk enkle eksempler (∫_0^x t²dt) og mer komplekse (∫_1^{x²} t dt, kjedeformel). Skil del 1 og del 2 av fundamentalteoremet terminologisk."}, {"id": "S2-FTK-02", "beskrivelse": "Elever forstår ikke at fundamentalteoremet kobler derivasjon og integrasjon som inverse operasjoner, og behandler dem som to uavhengige teknikker uten logisk sammenheng.", "nokkelord": ["fundamentalteorem", "inverse operasjoner", "sammenheng", "derivasjon", "integrasjon"], "tiltak": "Konstruer F(x) = ∫_0^x f(t)dt grafisk trinn for trinn og vis numerisk at F'(x) = f(x). La elevene selv verifisere dette for et enkelt f, og diskuter hva som er matematisk bemerkelsesverdig ved sammenhengen."}], "KM3129": [{"id": "S2-ANK-01", "beskrivelse": "Elever tror at integralet utelukkende brukes til arealberegning, og klarer ikke å tolke integralet i andre kontekster (akkumulert mengde, gjennomsnittlig verdi, total kostnad/inntekt).", "nokkelord": ["areal", "integral", "akkumulering", "tolkning", "kontekst"], "tiltak": "Presenter minst tre ulike kontekster: areal under kurve, total salgsinntekt som integral av marginalinntekt, og gjennomsnittlig verdi av en funksjon. Krev at elevene oversetter integralet til meningsfull tekst i hvert tilfelle."}, {"id": "S2-ANK-02", "beskrivelse": "Elever skiller ikke mellom funksjonen f, dens deriverte f' og dens antideriverte F, og blander dem i oppgavetolkning og beregning.", "nokkelord": ["funksjon", "derivert", "antiderivert", "notasjon", "f vs. F"], "tiltak": "Innfør systematisk fargebruk eller symbolbruk: f (original), f' (derivert, helning), F (antiderivert, akkumulert). Be elevene lese et koordinatsystem og identifisere hvilken av de tre de ser tegnet."}], "KM3127": [{"id": "S2-VEK-01", "beskrivelse": "Elever tror at eksponentiell vekst er tilnærmet lineær for 'små' verdier av x og undervurderer veksthastigheten. Misforståelsen er knyttet til kognitiv lineærisering (De Bock et al. 2007).", "nokkelord": ["eksponentiell", "lineær", "vekst", "linearisering", "tidlig fase"], "tiltak": "Plot eksponentialfunksjonen og tangentlinjen i x = 0 i samme vindu, og beregn den prosentvise avviket allerede for moderate x-verdier. Bruk logaritmisk y-akse for å vise at eksponentiell vekst er lineær på en slik skala."}, {"id": "S2-VEK-02", "beskrivelse": "Elever forstår ikke den logistiske vekstmodellen og antar enten at vekstraten er konstant (som eksponentiell) eller at populasjonen plutselig stopper å vokse ved bæreevnen K.", "nokkelord": ["logistisk vekst", "bæreevne", "vekstrate", "metning", "infleksjonspunkt"], "tiltak": "Tegn grafen til P(t) og P'(t) i samme koordinatsystem. Vis at vekstraten er størst ved P = K/2 (infleksjonspunktet), og at den avtar jevnt mot null etterpå. Knytt dette til den deriverte av logistikkfunksjonen."}], "KM3145": [{"id": "S2-EV-01", "beskrivelse": "Elever tror at E(X²) = [E(X)]², og bruker dette feilaktig i beregning av varians. Feilen gjør Var(X) = E(X²) − [E(X)]² meningsløst (det ville alltid gi 0) og er svært vanlig.", "nokkelord": ["forventningsverdi", "kvadrat", "varians", "E(X²)", "Jensen-ulikhet"], "tiltak": "Beregn E(X²) og [E(X)]² eksplisitt for en enkel diskret fordeling (f.eks. terningkast) og vis at de er ulike. Knytt til Jensen-ulikheten: for en konveks funksjon g gjelder E[g(X)] ≥ g(E[X]), med likhet kun for konstante X."}, {"id": "S2-EV-02", "beskrivelse": "Elever forveksler varians og standardavvik, bruker dem om hverandre, eller tror de har samme enhet. Særlig vanlig når Var(X) = 1 og SD(X) = 1 tilfeldigvis sammenfaller.", "nokkelord": ["varians", "standardavvik", "enhet", "kvadratrot", "SD vs. Var"], "tiltak": "Understreke at SD(X) = √Var(X) og har samme enhet som X (f.eks. kr), mens Var(X) har kvadrert enhet (kr²). Vis eksempler der Var = 9 gir SD = 3. Diskuter hvorfor SD ofte er mer tolkbart i praksis."}, {"id": "S2-EV-03", "beskrivelse": "Elever tror at forventningsverdien alltid er et mulig utfall av den stokastiske variabelen, f.eks. at E(X) = 3,5 for et terningkast betyr at 3,5 er mulig.", "nokkelord": ["forventningsverdi", "mulig utfall", "diskret fordeling", "vektet gjennomsnitt", "langtidssnitt"], "tiltak": "Definer E(X) konsekvent som et vektet langtidsgjennomsnitt over svært mange uavhengige gjentagelser – ikke et enkeltutfall. Vis to–tre eksempler der E(X) er et ikke-heltall for en heltalls-verdsatt variabel."}], "KM3124": [{"id": "S2-DIST-01", "beskrivelse": "Elever tror at normalfordelingen er den eneste aktuelle fordelingen i praksis og bruker den uten å sjekke forutsetningene (symmetri, store utvalg, kontinuerlig variabel).", "nokkelord": ["normalfordeling", "forutsetning", "modellvalg", "skjev fordeling", "diskret"], "tiltak": "Presenter eksempler der normalfordeling klart ikke er egnet: inntektsfordeling (skjev høyre), antall ulykker per uke (Poisson), andel defekte produkter (binomisk). Diskuter modelleringskriterier og tren elevene til å begrunne fordelingsvalg."}, {"id": "S2-DIST-02", "beskrivelse": "Elever forveksler utvalgsfordelingen (fordelingen til en estimator over mange utvalg) med populasjonsfordelingen eller enkeltobservasjoners fordeling.", "nokkelord": ["utvalgsfordeling", "populasjonsfordeling", "estimator", "utvalgsstørrelse", "gjentatte utvalg"], "tiltak": "Simuler gjentatte utvalg (n = 30) fra en tydelig skjev populasjon og plot fordelingen til utvalgsgjennomsnittet side om side med populasjonsfordelingen. Diskuter hva som er likt og ulikt og knytt til sentralgrensesetningen."}], "KM3128": [{"id": "S2-GRK-01", "beskrivelse": "Elever forveksler grensekostnad (derivert av totalkostnadsfunksjonen, K'(x)) med gjennomsnittskostnad per enhet (K(x)/x). Denne forvekslingen er grundig dokumentert i økonomimatematikk-didaktikk.", "nokkelord": ["grensekostnad", "gjennomsnittskostnad", "derivert", "K'(x)", "K(x)/x"], "tiltak": "Beregn eksplisitt begge størrelsene for samme kostnadsfunksjon ved ulike produksjonsnivåer og vis at de generelt ikke er like. Tegn begge kurvene i samme koordinatsystem og diskuter geometrisk tolkning."}, {"id": "S2-GRK-02", "beskrivelse": "Elever tror at maksimal profitt oppnås der inntekten er størst, ikke der grenseinntekt = grensekostnad (MR = MC). Feilen innebærer at de maksimerer I(x) i stedet for π(x) = I(x) − K(x).", "nokkelord": ["profitt", "grenseinntekt", "grensekostnad", "MR=MC", "maksimering"], "tiltak": "Sett opp profittfunksjonen π(x) = I(x) − K(x), deriver og sett lik null: π'(x) = I'(x) − K'(x) = 0, dvs. MR = MC. Vis et konkret eksempel der maksimal inntekt og maksimal profitt gir ulike optimale kvanta."}], "KM3123": [{"id": "S2-CLT-01", "beskrivelse": "Elever tror at sentralgrensesetningen (SGS) sier at dataene i populasjonen er normalfordelte for store n, ikke at fordelingen til utvalgsgjennomsnitt nærmer seg normalfordeling. Dette er en av de hyppigst dokumenterte SGS-misoppfatningene (Garfield 2002, delMas et al. 2004).", "nokkelord": ["sentralgrensesetning", "utvalgsgjennomsnitt", "populasjon", "normalfordeling", "fordeling til X̄"], "tiltak": "Vis simuleringer der individuelle data er uniformt eller skjevt fordelt, men der histogrammet for utvalgsgjennomsnitt (av mange trekk à n observasjoner) nærmer seg normalfordeling. Formuler SGS presist: 'fordelingen til X̄ nærmer seg N(μ, σ²/n) for stort n'."}, {"id": "S2-CLT-02", "beskrivelse": "Elever tror at SGS gjelder for enhver utvalgsstørrelse og bruker n = 5 som om det er tilstrekkelig for å anta normalfordeling for utvalgsgjennomsnitt.", "nokkelord": ["utvalgsstørrelse", "tilstrekkelig n", "tommelfingerregel", "n≥30", "konvergensspeed"], "tiltak": "Vis simuleringer for ulike n (5, 15, 30, 100) fra en skjev populasjon og vis at histogrammet for X̄ nærmer seg normalform progressivt. Diskuter tommelfingerregelen n ≥ 30 for moderat skjeve fordelinger og at kraftig skjevhet krever større n."}, {"id": "S2-CLT-03", "beskrivelse": "Elever forveksler populasjonsstandardavviket σ med standardfeilen SE = σ/√n, og forstår ikke at SE beskriver spredningen til utvalgsgjennomsnitt – ikke spredningen til enkeltobservasjoner.", "nokkelord": ["standardfeil", "standardavvik", "σ/√n", "utvalgsgjennomsnitt", "spredning"], "tiltak": "Skriv opp SE = σ/√n og demonstrer at SE halveres når n firedobles. Diskuter hva størrelsen representerer: ikke usikkerheten i én observasjon, men usikkerheten i gjennomsnittet beregnet fra et utvalg av størrelse n."}], "KM3144": [{"id": "S2-HYP-01", "beskrivelse": "Elever tror at p-verdien er sannsynligheten for at nullhypotesen H₀ er sann: P(H₀ | data). Korrekt definisjon er P(observere disse eller mer ekstreme data | H₀ er sann). Haller & Krauss (2002) fant at dette er den hyppigste enkeltmisoppfatningen i statistikkundervisning, og at den deles av mange lærere.", "nokkelord": ["p-verdi", "nullhypotese", "P(H0|data)", "inversjonsfeil", "signifikansnivå"], "tiltak": "Definer p-verdien presist og gjenta definisjonen ved hvert eksempel: 'Gitt at H₀ er sann, hva er sannsynligheten for å observere en teststørrelse like ekstrem eller mer ekstrem enn den vi fikk?' Diskuter eksplisitt hva P(H₀|data) ville kreve (Bayes) og hvorfor klassisk hypotesetesting ikke beregner dette."}, {"id": "S2-HYP-02", "beskrivelse": "Elever tror at 'vi forkaster ikke H₀' betyr at H₀ er bevist sann, og ignorerer type II-feil (β). Forskning viser at dette er nesten like vanlig som p-verdi-misforståelsen (Nickerson 2000).", "nokkelord": ["ikke forkast H₀", "bevis", "type II-feil", "beta", "feilslutning"], "tiltak": "Diskuter type I-feil (α: forkaste en sann H₀) og type II-feil (β: ikke forkaste en usann H₀) eksplisitt med 2×2-tabellen. Understreke at 'ikke forkaste H₀' kun betyr at dataene er forenlige med H₀ – det er ingen bekreftelse av H₀."}, {"id": "S2-HYP-03", "beskrivelse": "Elever forveksler statistisk signifikans med praktisk betydning regning"}, {"kode": "KM3121", "tekst": "gi eksempler på ulike situasjoner som kan modelleres ved å bruke ulike matematiske funksjoner, og modellere og analysere slike situasjoner ved å bruke reelle datasett", "kjerne": ["Utforsking og problemløsing", "Modellering og anvendelser", "Representasjon og kommunikasjon"], "strand": "analyse"}, {"kode": "KM3103", "tekst": "anvende derivasjon og integrasjon til å analysere og tolke egne matematiske modeller av reelle datasett", "kjerne": ["Utforsking og problemløsing", "Modellering og anvendelser", "Resonnering og argumentasjon", "Representasjon og kommunikasjon"], "strand": "analyse"}, {"kode": "KM3120", "tekst": "analysere og tolke ulike funksjoner ved å bruke derivasjon og integrasjon, og anvende integrasjon til å beregne ulike mål av omdreiningslegemer", "kjerne": ["Modellering og anvendelser", "Resonnering og argumentasjon"], "strand": "analyse"}, {"kode": "KM3107", "tekst": "anvende parameterframstillinger til kurver og bruke parameterframstillinger til å løse naturvitenskapelige problemer inkludert problemer knyttet til fart og akselerasjon", "kjerne": ["Utforsking og problemløsing", "Modellering og anvendelser", "Representasjon og kommunikasjon"], "strand": "geometri_bevegelse"}, {"kode": "KM3108", "tekst": "utforske og forstå regneregler for vektorer i rommet, og bruke vektorer til å beregne ulike størrelser i rommet", "kjerne": ["Utforsking og problemløsing", "Modellering og anvendelser", "Abstraksjon og generalisering"], "strand": "vektorer"}, {"kode": "KM3104", "tekst": "utforske egenskaper ved radianer og trigonometriske funksjoner og identiteter og anvende disse egenskapene til å løse praktiske problemer", "kjerne": ["Utforsking og problemløsing", "Modellering og anvendelser"], "strand": "trigonometri"}, {"kode": "KM3099", "tekst": "analysere og forstå matematiske bevis, forklare de bærende ideene i et matematisk bevis og utvikle egne bevis", "kjerne": ["Resonnering og argumentasjon", "Representasjon og kommunikasjon", "Abstraksjon og generalisering"], "strand": "bevis"}], "tax": {"KM3106": [{"id": "KM3106-M1", "beskrivelse": "Eleven tror at dersom leddene i en rekke går mot null, konvergerer rekken nødvendigvis. Generaliseringen «a_n → 0 ⟹ Σa_n konvergerer» er en av de best dokumenterte misoppfatningene i kalkulusopplæring (Chagwiza, Maharaj & Brijlall 2020; Genc & Akinci 2020). Feilen skyldes delvis at det omvendte er sant (divergens impliserer at leddene ikke → 0), og at elever over-generaliserer denne gyldige implikasjonen.", "nokkelord": ["leddene går mot null", "1/n konvergerer", "nødvendig betingelse", "harmonisk rekke divergerer ikke", "ledd nærmer seg 0"], "tiltak": "Bruk harmonisk rekke Σ(1/n) eksplisitt som standardmoteksempel: vis at 1 + 1/2 + 1/3 + ... divergerer til tross for at 1/n → 0. La elevene beregne partialsummer med kode og se at summen vokser uten grense. Øv konsekvent på å skille mellom nødvendig og tilstrekkelig betingelse i skriftlig og muntlig argumentasjon."}, {"id": "KM3106-M2", "beskrivelse": "Eleven anvender formelen for sum av uendelig geometrisk rekke (S = a/(1−r)) uten å kontrollere at |r| < 1. Konvergensvilkåret oppleves som en formalitet og utelates, særlig under tidspress. Resulterer i meningsløse svar som negativ sum av positive ledd.", "nokkelord": ["s = a/(1-r)", "r større enn 1", "gjelder alltid", "uendelig sum", "kvotient"], "tiltak": "Krev alltid eksplisitt begrunnelse for konvergensvilkåret som del av besvarelsen. Gi oppgaver der |r| ≥ 1 og be eleven forklare resultatet; avsløringen av meningsløse svar (f.eks. negativ sum av positive tall) motiverer vilkåret faglig, ikke bare formelt."}, {"id": "KM3106-M3", "beskrivelse": "Eleven blander følgen av ledd (a_n) og følgen av partialsummer (S_n), og bruker konvergensegenskaper om den ene på den andre. Typisk: eleven sier 'rekken S_n konvergerer' når meningen er 'leddene a_n → 0', eller tolker S_n som det n-te leddet.", "nokkelord": ["ledd og delsum", "s_n og a_n", "partialsummer blandes", "følgen konvergerer"], "tiltak": "Tegn to adskilte kolonner (a_n og S_n) for konkrete rekker i tabellform. Øv på å stille og svare på spørsmålene: «Hva er det tredje leddet?» versus «Hva er den tredje partialsummen?» Krev presis notasjon der a_n og S_n aldri brukes om hverandre."}], "KM3105": [{"id": "KM3105-M1", "beskrivelse": "Eleven tror en rekursiv definisjon alltid lar seg løse til en eksplisitt lukket formel, og bruker tid på å «forenkle» rekursjoner som ikke har elementær lukket form. Mangler forståelse av at numerisk/algoritmisk tilnærming er den primære løsningsstrategien for mange praktisk relevante rekursjoner.", "nokkelord": ["eksplisitt formel", "lukket form", "alltid mulig å forenkle", "rekursjon er ufullstendig", "analytisk løsning"], "tiltak": "Presenter logistisk vekst eller rekursjoner fra populasjonsmodeller der eksakt lukket form enten ikke finnes elementært eller er langt mer kompleks enn den rekursive definisjonen. La elever implementere og visualisere numeriske løsninger. Diskuter numerisk løsning som fullverdig matematisk svar."}, {"id": "KM3105-M2", "beskrivelse": "Indekseringsfeil: eleven begynner løkken eller definisjonen på feil indeks (off-by-one), typisk ved forvirring mellom a_1 og a_0 som første ledd, eller ved beregning av det N-te leddet. Medfører systematisk feil i summer og tabeller.", "nokkelord": ["feil startindeks", "a_0 eller a_1", "off by one", "første ledd", "indeks i løkke"], "tiltak": "Krev at eleven alltid skriver opp de tre første leddene for hånd og sammenligner med programutskriften. Bruk automatiserte tester som sjekker a_1, a_2 og a_3 mot kjente verdier eksplisitt. Diskuter indexering som en eksplisitt designbeslutning i kode."}], "KM3102": [{"id": "KM3102-M1", "beskrivelse": "Eleven tolker alltid det bestemte integralet som «areal under kurven» og ignorerer at integralet er negativt når funksjonen er negativ på integrasjonsintervallet. Summerer absoluttverdier av arealer i stedet for signerte Riemann-summer. Dokumentert systematisk av Orton (1983) og Thompson (1994).", "nokkelord": ["areal er alltid positivt", "negativ funksjon", "under x-aksen", "absolutt areal", "signert areal"], "tiltak": "Gi oppgaver der f(x) < 0 på hele intervallet og krev beregning uten absoluttverdier. Koble direkte til Riemann-summer: negative funksjonsverdier gir negative rektangelarealer. Diskuter to ulike oppgavetyper: «netto-areal» (signert integral) versus «totalareal» (∫|f(x)|dx), og krev at eleven identifiserer hvilken type som gjelder i konteksten."}, {"id": "KM3102-M2", "beskrivelse": "Eleven tror at en tilstrekkelig fin inndeling (mange nok delintervaller) gir nøyaktig svar, ikke bare en bedre tilnærming. Forstår ikke at grenseverdien n → ∞ er definisjonsmessig det eksakte integralet, mens enhver endelig Riemann-sum bare er en approksimasjon.", "nokkelord": ["mange rektangler gir eksakt svar", "nok rektangler", "tilnærming er eksakt", "n stor nok er eksakt"], "tiltak": "Skill konsekvent mellom tilnærming og eksakt verdi i all kommunikasjon. La elever beregne integralet nøyaktig via antiderivering, sammenligne med Riemann-summer for stigende n, og se at differansen aldri blir null for endelig n. Still spørsmålet: «Hva skjer i grensen n → ∞, og hva skjer for enhver konkret n?»"}, {"id": "KM3102-M3", "beskrivelse": "Eleven tolker integrasjonsvariabelen dx som en selvstendig infinitesimal størrelse som «kansellerer» algebraisk, uten å forstå at dx er en del av notasjonen for grenseverdien til Δx → 0. Hindrer riktig forståelse av substitusjon og tolkning av numerisk integrasjon.", "nokkelord": ["dx kansellerer", "delta x", "hva er dx", "infinitesimal størrelse", "dx forkortes"], "tiltak": "Knytt dx eksplisitt til Δx i Riemann-summen og vis symbolsk overgangen til grenseverdien: Σ f(x_i)·Δx → ∫f(x)dx. Unngå formuleringen «dx forkortes bort» i substitusjon uten begrunnelse. Vis i stedet substitusjonsregelen som en presis konsekvens av kjerneregelen."}], "KM3100": [{"id": "KM3100-M1", "beskrivelse": "Eleven tror differensiasjon og integrasjon er nøyaktig inverse operasjoner i alle tilfeller uten betingelser, og overser at AFT Del 1 krever kontinuitet av integranden, og Del 2 krever at F faktisk er en antiderivert. Dokumentert av Carlson, Smith & Persson (2003) og Thompson & Silverman (2008) som den hyppigste konseptuelle feilen med AFT.", "nokkelord": ["derivasjon og integrasjon opphever hverandre alltid", "inverse operasjoner", "alltid omvendt", "integrasjon er omvendt derivasjon"], "tiltak": "Fremhev at AFT kobler de to operasjonene under spesifikke betingelser (kontinuitet). Vis AFT Del 1 konstruktivt: definer F(x) = ∫_a^x f(t)dt og deriver fra definisjon. Gi moteksempel med ikke-kontinuerlig integrand. Skill mellom ubestemt integral (familie av funksjoner + C) og bestemt integral (et tall)."}, {"id": "KM3100-M2", "beskrivelse": "Eleven legger til integrasjonskonstanten +C ved beregning av bestemte integraler fordi skillet mellom ubestemt og bestemt integral ikke er internalisert. Blant de hyppigst observerte formelle feilene i skriftlige kalkulus-prøver (Radmehr & Drake 2020).", "nokkelord": ["+ c i bestemt integral", "integrasjonskonstant i bestemt integral", "glemmer å ta bort c", "konstant ledd"], "tiltak": "Vis eksplisitt at C forsvinner ved innsetting av grenser: [F(x) + C]_a^b = (F(b) + C) − (F(a) + C) = F(b) − F(a). Krev at elever skriver ut mellomregningen fullt ut i en periode. Diskuter hva C betyr konseptuelt i de to integralformene og hvorfor det er irrelevant i det bestemte integralet."}, {"id": "KM3100-M3", "beskrivelse": "Eleven misforstår AFT Del 1: beregner d/dx[∫_a^x f(t)dt] som f(a), f(x)·x, eller f(x²) (ved sammensatt øvre grense uten kjerneregelkorreksjon), i stedet for f(x). Skyldes manglende skille mellom den faste nedre grensen a, integrasjonsvariabelen t (dummyvariabel), og den frie øvre grensen x.", "nokkelord": ["øvre grense som variabel", "dummy-variabel", "derivert av integral", "f(a) i stedet for f(x)", "kjerneregelen mangler"], "tiltak": "Bruk konkrete numeriske eksempler: definer F(x) = ∫_0^x t² dt = x³/3 og deriver. La eleven beregne F(2) og F(3) numerisk og verifisere at F'(2) ≈ 4 = 2². Innfør kjerneregelen eksplisitt for sammensatte øvre grenser som g(x): d/dx[∫_a^{g(x)} f(t)dt] = f(g(x))·g'(x)."}], "KM3101": [{"id": "KM3101-M1", "beskrivelse": "Eleven tror trapesmetoden alltid er mer nøyaktig enn venstre/høyre Riemann-summer, uten å forstå at dette avhenger av kurvaturen (konveksitet/konkavitet) til integranden. For sterkt konvekse funksjoner overestimerer trapesmetoden systematisk.", "nokkelord": ["trapesmetoden er alltid best", "trapesmetoden er eksakt nok", "bedre enn rektangler alltid", "konveksitet"], "tiltak": "Sammenlign metodene for f(x) = e^x (konveks) og f(x) = √x (konkav) og vis at trapesmetoden henholdsvis over- og underestimerer. Tegn kurvene med trapesene og gjør feilen geometrisk synlig. Knytt til andreordens Taylorutvikling av feilen."}, {"id": "KM3101-M2", "beskrivelse": "Eleven undervurderer betydningen av metodens konvergensorden: tror feilen halveres ved dobling av n (lineær konvergens), og forstår ikke at trapesmetoden har O(h²)-feil og Simpsons metode O(h⁴)-feil, noe som gir dramatisk ulik konvergenshastighet.", "nokkelord": ["dobler n gir halv feil", "feilorden", "konvergenshastighet", "simpson vs trapes", "n stor nok"], "tiltak": "La elever lage tabell over absoluttfeil mot n (n = 10, 20, 40, 80) for trapesmetoden og Simpsons metode på samme funksjon. Beregn feilforholdet og se at det er ≈ 4 for trapes og ≈ 16 for Simpson. Visualiser at Simpson konvergerer mye raskere med en log-log-graf."}], "KM3121": [{"id": "KM3121-M1", "beskrivelse": "Eleven tror at modellen med best tilpasning til datasettet (lavest residualsum eller høyest R²) nødvendigvis er den beste matematiske modellen, uten å vurdere overfitting, ekstrapolering utenfor datadomenet eller faglig relevans av funksjonstypen.", "nokkelord": ["best fit er best modell", "lavest avvik", "r-kvadrat er alt", "overfitting", "ekstrapolering utenfor data"], "tiltak": "Vis datasett der polynomregresjon av høy grad passer perfekt på treningspunkter men gir absurde prediksjoner utenfor datadomenet. Diskuter valg av modelltype ut fra faglig kontekst: eksponentialvekst for biologisk populasjon, sinusmodell for periodiske fenomener, lineær for direkte proporsjonalitet."}, {"id": "KM3121-M2", "beskrivelse": "Eleven blander kausalitet og korrelasjon, og tolker en sterk matematisk sammenheng mellom to variable i et datasett som en kausal relasjon. Kritisk feil i tverrfaglig modellering der matematiske funn omsettes til faglige konklusjoner.", "nokkelord": ["korrelasjon er årsak", "sammenheng betyr kausalitet", "høy r-kvadrat betyr årsak", "spuriøs korrelasjon"], "tiltak": "Presenter klassiske spuriøse korrelasjoner (f.eks. iskrem-salg og drukningsulykker, sko-størrelse og lesekompetanse hos barn). Krev at elever begrunner kausalhypotesen faglig og ikke bare matematisk. Diskuter kontrollvariabler og konfunderende faktorer."}], "KM3103": [{"id": "KM3103-M1", "beskrivelse": "Eleven tror f'(c) = 0 er tilstrekkelig betingelse for lokalt ekstremum, og overser at stasjonære punkter kan være vendepunkter (sadelpunkter). Feilen forsterkes av at andrederivattesten presenteres som den eneste metoden, uten å presisere at den forutsetter f''(c) ≠ 0.", "nokkelord": ["f' lik null er maksimum eller minimum", "andrederivat er alltid avgjørende", "stasjonært punkt er alltid ekstremum", "vendepunkt"], "tiltak": "Gi eksempler der f'(c) = 0 og f''(c) = 0 (f.eks. f(x) = x³ ved x = 0 og f(x) = x⁴ ved x = 0) og vis at andrederivattesten er uavgjørende i første tilfelle og bekreftes i andre. Innfør fortegnsskjema for f' som robust og generell metode uten disse begrensningene."}, {"id": "KM3103-M2", "beskrivelse": "Eleven forveksler lokalt og globalt (absolutt) ekstremum og rapporterer lokalt maksimum som svar på spørsmålet «finn maksimalverdien til f på [a, b]». Spesielt vanlig på lukkede intervaller der randbetingelsene må sjekkes i tillegg til stasjonære punkter.", "nokkelord": ["lokal og global maksimum blandes", "randbetingelse glemmes", "lukket intervall", "absolutt maksimum"], "tiltak": "Krev systematisk at eleven sjekker grensepunktene f(a) og f(b) i tillegg til alle stasjonære punkter og setter opp en sammenlignende tabell. Bruk grafplotting for å se helhetsbildet. Still alltid spørsmålet: «Er dette det høyeste punktet på hele det aktuelle intervallet?»"}], "KM3120": [{"id": "KM3120-M1", "beskrivelse": "Eleven beregner volumet av et omdreiningslegeme som π·∫f(x)dx i stedet for π·∫[f(x)]²dx, fordi eleven glemmer å kvadrere radiusen i skivemetoden. Analogt med å forveksle diameter og radius i sirkelens arealformel.", "nokkelord": ["glemmer å kvadrere radius", "f(x) ikke f(x)^2", "skivemetoden", "π ganger integral av f", "radius vs areal"], "tiltak": "Utled formelen fra skivemetoden grundig fra første prinsipper: areal av sirkelskive = π·r² = π·[f(x)]², volum = ∫π·[f(x)]²dx. Tegn en 3D-skisse som viser at r = f(x) er radiusen til en enkelt skive. La elever lede utledningen selv fremfor å memorere formelen."}, {"id": "KM3120-M2", "beskrivelse": "Eleven setter opp volumintegralet for rotasjon rundt x-aksen selv om oppgaven spesifiserer rotasjon rundt y-aksen, uten å bytte integrasjonsvariabel eller invertere funksjonen. Gir feil oppsett og svar, og avslører mangelfull romlig forståelse.", "nokkelord": ["feil rotasjonsakse", "rundt y-aksen", "bytte variabel glemmes", "invers funksjon mangler"], "tiltak": "Krev at eleven alltid tegner opp situasjonen med rotasjonsaksen klart markert som første steg. Vis eksplisitt at rotasjon rundt y-aksen krever integrasjon i y og at man trenger x = g(y). Gi sidestilte oppgaver — samme kurve, ulike rotasjonsaksjer — og sammenlign oppsettene."}, {"id": "KM3120-M3", "beskrivelse": "Eleven bruker feil formel for volumet mellom to kurver («washer»-metoden): skriver π∫(f(x)−g(x))²dx i stedet for den korrekte π∫([f(x)]²−[g(x)]²)dx. Feilen stammer fra å behandle forskjellen av funksjoner som radien til ringen, i stedet for å subtrahere arealene av de to sirklene.", "nokkelord": ["f minus g kvadrert", "(f-g)^2", "washer-metoden", "to kurver volum", "ring-tverrsnitt"], "tiltak": "Vis utledningen: hvert tverrsnitt er en ring med ytterradius R = f(x) og innerradius r = g(x). Areal av ring = π(R² − r²) = π(f² − g²). Sammenlign eksplisitt med feilformelen π(f−g)² og bruk talleksempel for å vise at (f−g)² ≠ f²−g² generelt."}], "KM3107": [{"id": "KM3107-M1", "beskrivelse": "Eleven blander hastighetsvektoren v(t) = (x'(t), y'(t), z'(t)) med skalaren fart |v(t)|, og bruker fortegnet til én komponent (f.eks. x'(t) < 0) som bevis på at «farten er negativ». Forstår ikke at fart alltid er ikke-negativ (euklidsk lengde av vektoren).", "nokkelord": ["fart er negativ", "hastighet og fart", "fortegn til vx", "komponent er fart", "skalær og vektor"], "tiltak": "Definer presist: hastighet = v(t) = (x'(t), y'(t)), fart = |v(t)| = √(x'(t)² + y'(t)²). Gi oppgaver der x'(t) < 0 men farten er positiv, og knytt til den fysiske tolkningen: negativ x-komponent betyr bevegelse i negativ x-retning, men partikkelen beveger seg likevel."}, {"id": "KM3107-M2", "beskrivelse": "Eleven tror parametriseringen av en kurve er unik, og forstår ikke at uendelig mange parametriseringer beskriver den samme geometriske banen. Misforståelsen hindrer fleksibel kurveanalyse og sammenligninger av bane og bevegelse.", "nokkelord": ["én parametrisering", "parametrisering er unik", "samme kurve ulik fart", "omarrangere parameter", "geometrisk bane"], "tiltak": "Vis at enhetssirkelen kan parametriseres som (cos t, sin t), (cos 2t, sin 2t) og (cos(−t), sin(−t)) — alle gir samme geometriske kurve men ulik traverseringshastighet og retning. La elever verifisere med grafplotting og beregne farten i hvert tilfelle."}, {"id": "KM3107-M3", "beskrivelse": "Eleven beregner stigningstallet til tangentlinjen som dy/dt ÷ dx/dt korrekt, men bruker formelen når dx/dt = 0 (tilsvarer vertikal tangent) og tolker ikke 0/0 eller ∞ riktig. Ser heller ikke at kjerneregelen er nødvendig for andre deriverte i parameterform.", "nokkelord": ["dy/dx parametrisk", "dx/dt lik null", "lodrett tangent", "0 i nevner", "parametrisk derivasjon andrederivat"], "tiltak": "Vis at dy/dx = (dy/dt)/(dx/dt) er udefinert når dx/dt = 0, og at dette geometrisk tilsvarer en vertikal tangent. Gi oppgaver der eleven skal identifisere og tolke slike punkter. Utled eksplisitt den andre deriverte i parameterform: d²y/dx² = (d/dt[dy/dx])/(dx/dt)."}], "KM3108": [{"id": "KM3108-M1", "beskrivelse": "Eleven tror kryssproduktet er kommutativt: a × b = b × a. Overser antikommutativiteten a × b = −(b × a), noe som gir feil retning på normalvektoren til et plan eller feil fortegn på volumet til et parallelepiped.", "nokkelord": ["kryssprodukt kommutativt", "a×b = b×a", "rekkefølge spiller ingen rolle", "antikommutativt"], "tiltak": "Vis geometrisk at a × b og b × a peker i motsatte retninger via høyrehåndsregelen. La elevene beregne begge kryssprodukter for konkrete vektorer og verifisere at summen er nullvektoren. Knytt til determinantformelen: radbytte endrer fortegnet."}, {"id": "KM3108-M2", "beskrivelse": "Eleven tror at skalarproduktet a · b = 0 betyr at minst én av vektorene er nullvektoren, fordi eleven overfører nullproduktsregelen for skalarer. Forstår ikke at nullskalarprodukt betyr ortogonalitet for to ikke-null vektorer.", "nokkelord": ["a·b = 0 betyr null-vektor", "ortogonal", "vinkelrett", "nullprodukt for vektorer", "skalarproduktet er null"], "tiltak": "Gi eksempel: (1, 0, 0) · (0, 1, 0) = 0, men begge vektorer er ikke-null. Diskuter geometrisk: «Hva betyr det at skalarproduktet er null?» Knytt til vinkelformelen cos θ = (a · b)/(|a||b|) og vis at cos θ = 0 betyr θ = 90°."}, {"id": "KM3108-M3", "beskrivelse": "Eleven blander skalarproduktet (resulterer i et tall ∈ ℝ) og kryssproduktet (resulterer i en vektor ∈ ℝ³), og forsøker f.eks. å bruke skalarproduktet til å finne normalvektoren til et plan, eller tolker kryssproduktet som et tall.", "nokkelord": ["skalarprodukt er vektor", "kryssprodukt er tall", "normalvektor med skalarprodukt", "produkt av vektorer", "type av svar"], "tiltak": "Vektlegg fra starten at skalarprodukt ∈ ℝ (ett tall) og kryssprodukt ∈ ℝ³ (en vektor). Bruk fargekoding konsekvent: blå for skalarer, rød for vektorer. Still alltid spørsmålet etter beregning: «Er svaret ditt et tall eller en vektor? Hva forventet du?»"}], "KM3104": [{"id": "KM3104-M1", "beskrivelse": "Eleven bruker grader i stedet for radianer ved derivasjon og integrasjon av trigonometriske funksjoner, og får feil svar fordi derivasjonsregelen d/dx[sin x] = cos x kun gjelder med x i radianer. Feilen er veldokumentert (Maknun, Rosjanuardi & Jupri 2020) og gjentar seg i integrasjonsoppgaver.", "nokkelord": ["grader i kalkulus", "sinus i grader", "feil derivert av sinus", "180 over pi", "radianer nødvendig"], "tiltak": "Bevis eksplisitt at d/dx[sin x] = cos x forutsetter radianmål, via grenseverdien lim_{h→0}(sin h / h) = 1 (som kun er sann med radianer). Vis hva som skjer om man bruker grader: d/dx[sin(x°)] = (π/180)·cos(x°). Krev radianer konsekvent i all kalkulus fra starten."}, {"id": "KM3104-M2", "beskrivelse": "Eleven tror sin(a + b) = sin a + sin b og tilsvarende for cos og tan, og anvender feilaktig distributivitet. En av de mest utbredte trigonometriske misoppfatningene blant videregående elever (Maknun, Rosjanuardi & Jupri 2020; Topphol 2023). Hindrer riktig bruk av addisjonsformlene i bevis og integrasjon.", "nokkelord": ["sin(a+b) = sina + sinb", "distribuere sinus", "addisjonsteoremet feil", "cos(a+b) = cosa + cosb"], "tiltak": "Vis numerisk moteksempel: sin(30° + 60°) = sin 90° = 1, men sin 30° + sin 60° = 0,5 + 0,866 ≈ 1,366 ≠ 1. Skriv addisjonsformlene tydelig med begrunnelse. Øv på å anvende dem i begge retninger — både utvikling og sammentrekning — i konkrete oppgaver."}, {"id": "KM3104-M3", "beskrivelse": "Eleven blander perioden til sin(kx) og cos(kx): oppgir perioden som k·2π i stedet for 2π/k. Tilsvarende forveksles amplitude og periode ved vertikale og horisontale skaleringer, særlig ved sammensatte uttrykk som A·sin(kx + φ) + d.", "nokkelord": ["periode k ganger 2pi", "feil periode ved skalering", "frekvens og periode", "amplitude og periode blandes"], "tiltak": "Utled perioden fra definisjonen: T er den minste positive konstanten slik at f(x + T) = f(x) for alle x. For sin(kx): k(x + T) = kx + 2π ⟹ T = 2π/k. La elever verifisere grafisk ved å variere k i GeoGebra og observere effekten. Skill konsekvent mellom vertikal skalering (amplitude) og horisontal skalering (periode)."}], "KM3099": [{"id": "KM3099-M1", "beskrivelse": "Eleven tror at ett eller flere eksempler er tilstrekkelig for å bevise et generelt matematisk utsagn («empirisk bevis»). Grunnleggende misoppfatning om bevisers natur, bredt dokumentert av Harel & Sowder (1998) og Bell (1976). Hindrer overgang fra induktiv til deduktiv tenkning.", "nokkelord": ["eksempel er bevis", "vist det for mange tall", "spesialtilfelle beviser generelt", "induktivt bevis", "generelt bevis"], "tiltak": "Vis eksempler der mønsteret holder for svært mange tilfeller men bryter: n² + n + 41 er primtall for n = 0, 1, …, 39 men ikke n = 40. Diskuter hva som skiller et bevis fra en observasjon, og hva «for alle naturlige tall» faktisk krever. Krev alltid generell, variabelbasert argumentasjon."}, {"id": "KM3099-M2", "beskrivelse": "Eleven forveksler en påstand P med dens konvers eller biimplikasjon, og tror bevis av «P ⟹ Q» også beviser «Q ⟹ P». Eksempel fra pensumet: beviser «rekken konvergerer ⟹ leddene → 0» og tror dette beviser «leddene → 0 ⟹ rekken konvergerer».", "nokkelord": ["konvers", "omvending av implikasjon", "hvis og bare hvis", "ekvivalens feiltolket", "implikasjon begge veier"], "tiltak": "Bruk Venn-diagrammer over mengder av matematiske objekter for å illustrere at P ⟹ Q ikke gir Q ⟹ P. Koble til konkrete eksempler fra pensumet (harmonisk rekke som moteksempel til konversen). Øv på å skrive opp implikasjon, konvers, kontrapositivt og biimplikasjon eksplisitt for gitte utsagn."}, {"id": "KM3099-M3", "beskrivelse": "Eleven starter indirekte bevis (bevis ved motsigelse) ved å anta det man ønsker å bevise, i stedet for å anta negasjonen av konklusjonen. Grunnleggende forvirring om bevisstrukturens logikk: hva som er hypotese, hva som er konklusjon, og hva som er antagelse for motsigelse.", "nokkelord": ["antar det vi vil bevise", "indirekte bevis feil start", "bevis ved motsigelse feil", "negasjon av konklusjon", "kontrapositiv"], "tiltak": "Gi elevene en fast bevismal: «Anta for motsigelse at [negasjon av konklusjon]. Da ... [logisk kjede] ... men dette er i strid med [hypotesen / et kjent faktum]. Dermed er [konklusjonen] sann.» La elever øve på å formulere negasjonen av ulike påstander som et separat forberedende steg."}]}, "kw": {"rekker": ["KM3106"], "anvendel": ["KM3106"], "rekursiv": ["KM3105"], "programm": ["KM3101", "KM3105"], "framgang": ["KM3105"], "integral": ["KM3101", "KM3102"], "grenseve": ["KM3102"], "summer": ["KM3102"], "betydnin": ["KM3102"], "analysen": ["KM3100"], "fundamen": ["KM3100"], "konsekve": ["KM3100"], "teoremet": ["KM3100"], "utvikle": ["KM3099", "KM3101"], "algoritm": ["KM3101"], "numerisk": ["KM3101"], "utføre": ["KM3101"], "modeller": ["KM3103", "KM3121"], "funksjon": ["KM3104", "KM3120", "KM3121"], "datasett": ["KM3103", "KM3121"], "derivasj": ["KM3103", "KM3120"], "integras": ["KM3103", "KM3120"], "omdreini": ["KM3120"], "paramete": ["KM3107"], "kurver": ["KM3107"], "akselera": ["KM3107"], "forstå": ["KM3099", "KM3108"], "regnereg": ["KM3108"], "vektorer": ["KM3108"], "rommet": ["KM3108"], "størrels": ["KM3108"], "radianer": ["KM3104"], "trigonom": ["KM3104"], "identite": ["KM3104"], "forklare": ["KM3099"], "bærende": ["KM3099"], "ideene": ["KM3099"], "matemati": ["KM3099"]}, "loop": {"goal": "KM3106", "goalText": "utforske egenskaper ved uli function renderMenu(){const groups={"Praktisk":[],"Teoretisk":[],"Samfunnsfag":[],"Realfag":[]};
 DB.order.forEach(f=>groups[DB.subjects[f].loep].push(f));let h="";
 for(const gr in groups){if(!groups[gr].length)continue;h+=`<div class="group">${gr}</div><div class="grid">`;
  for(const f of groups[gr]){const s=DB.subjects[f];const nmis=Object.keys(s.tax).length;
   h+=`<div class="card" style="border-top-color:${s.farge}" onclick="openFag('${f}')"><span class="cnt">${s.antall} mål</span>
     <div class="nm">${f.replace('Matematikk ','')}</div><div class="meta">${f}</div>

  h+=`</div>`;}
 document.getElementById('menu').innerHTML=h;}

 const cl=document.getElementById('chatlog');if(cl)cl.innerHTML='';

 document.getElementById('landing').classList.add('off');document.getElementById('workspace').classList.add('on');
 document.getElementById('wsName').textContent=f;document.getElementById('wsMeta').textContent=`${s.aar} · ${s.loep} · ${s.antall} kompetansemål`;
 const tabs=[["plan","Årsplan"],["mal","Kompetansemål"],["loop","Lukket sløyfe"]];
 document.getElementById('wsNav').innerHTML=tabs.map((t,i)=>`<div class="item ${i==0?'on':''}" onclick="tab('${t[0]}',this)">${t[1]}</div>`).join("");
 renderAll(s);}

function tab(id,el){document.querySelectorAll('.nav .item').forEach(x=>x.classList.remove('on'));el.classList.add('on');
 document.querySelectorAll('#wsMain .panel').forEach(x=>x.classList.remove('on'));document.getElementById('p-'+id).classList.add('on');}

function togWk(id){document.getElementById(id).classList.toggle('open');}
function planExpand(open){document.querySelectorAll('.tree .term-node, .tree .wk-node').forEach(n=>{if(n.classList.contains('vurd-node'))return;n.classList.toggle('open',open);});}
function renderAll(s){let h="";
 h+=`<div class="panel on" id="p-plan"><div class="h2">Årsplan</div><div class="sub">Terminer og uker i én oversikt. Klikk for å utvide. Rekkefølgen følger forkunnskaps-grafen for ${s.fag}. ${s.fag==='Matematikk R1'?'':'<b>Agent-generert utkast — kalibreres med lærer.</b>'} Læreren eier og redigerer alt.</div>`;
 h+=`<div class="planbar"><button class="mini" onclick="planExpand(true)">Utvid alle</button><button class="mini" onclick="planExpand(false)">Lukk alle</button></div>`;
 h+=`<div class="tree">`;
 for(let pi=0;pi<s.plan.perioder.length;pi++){const p=s.plan.perioder[pi];
  const tWeeks=s.weeks.filter(w=>w.termin===p.termin);
  const open=pi===0?' open':'';
  h+=`<div class="term-node${open}" id="term-${pi}">`;
  h+=`<div class="term-head" onclick="togTerm(${pi})"><span class="tw"></span><span class="term-title">${p.termin}</span><span class="term-meta">${tWeeks.length} uker · ${p.uker_innhold} fagstoff + ${p.uker_vurdering} vurdering</span></div>`;
  h+=`<div class="term-body">`;
  for(const w of tWeeks){
   const wid=`w-${pi}-${w.uke}`;
   if(w.type==='vurd'){
    h+=`<div class="wk-node vurd-node"><div class="wk-head wk-static"><span class="wk-no">Uke ${w.uke}</span><span class="wk-tag vurd-tag">Vurdering / repetisjon</span></div></div>`;
   }else{
    const sn=w.strand?sname(s.fag,w.strand):'fagstoff';
    h+=`<div class="wk-node" id="${wid}">`;
    h+=`<div class="wk-head" onclick="togWk('${wid}')"><span class="tw"></span><span class="wk-no">Uke ${w.uke}</span><span class="wk-tag">${sn}</span><span class="wk-code">${w.kode}</span></div>`;
    h+=`<div class="wk-body"><div class="wk-goal">${w.tekst}</div><div class="pre">↳ ${w.forkunnskap||'ingen forutsetninger'}</div></div>`;
    h+=`</div>`;
   }
  }
  h+=`</div></div>`;
 }
 h+=`</div></div>`;
 h+=`<div class="panel" id="p-mal"><div class="h2">Kompetansemål (${s.sett})</div><div class="sub">LK20 fra Udir. Bokmål vist; nynorsk finnes også.</div>`;
 for(const g of s.goals)h+=`<div class="goal"><span class="code">${g.kode}</span>${g.strand?`<span class="chip">${sname(s.fag,g.strand)}</span>`:''}<div>${g.tekst}</div></div>`;h+=`</div>`;
 h+=`<div class="panel" id="p-loop"><div class="h2">Lukket sløyfe</div><div class="sub">Velg kompetansemål, lim inn <b>anonyme</b> svar (ett per linje). AI gjør tolkningen.</div>`;
 const taxCodes=Object.keys(s.tax);
 h+=`<select id="loopGoal" onchange="fillLoop()">`+taxCodes.map(c=>`<option value="${c}">${c}: ${(DB.subjects[CUR].goals.find(g=>g.kode===c)||{}).tekst.slice(0,55)}...</option>`).join("")+`</select>`;
 h+=`<textarea id="answers"></textarea><div style="margin-top:10px"><button onclick="runLoop()">Analyser klassen → foreslå justering</button></div><div id="loopOut" style="margin-top:14px"></div></div>`;
 document.getElementById('wsMain').innerHTML=h;
 fillLoop();fillChatEx();
 document.getElementById('asstHint').textContent=`Jeg er Per. Spør om ${s.fag}, planlegging — eller hva som helst ellers.`;
}
function fillLoop(){const s=DB.subjects[CUR];const sel=document.getElementById('loopGoal');const code=sel?sel.value:s.loop.goal;
 // syntetiske svar fra taksonomi
 const misc=s.tax[code]||[];const ans=[];misc.slice(0,2).forEach(m=>ans.push("en elev skrev: "+((m.nokkelord||[m.id])[0])));
 ans.push("dette svaret viser god forståelse uten feil");ans.push("riktig fremgangsmåte og korrekt svar");
 document.getElementById('answers').value=ans.join("\n");}
function runLoop(){const s=DB.subjects[CUR];const code=document.getElementById('loopGoal').value;
 const answers=document.getElementById('answers').value.split('\n').map(x=>x.trim()).filter(Boolean);
 const pats=s.tax[code]||[],n=answers.length,hits={};pats.forEach(p=>hits[p.id]=0);
 for(const a of answers){const low=a.toLowerCase();for(const p of pats)if((p.nokkelord||[]).some(k=>low.includes(k.toLowerCase())))hits[p.id]++;}
 const funn=pats.filter(p=>hits[p.id]>0).map(p=>({...p,antall:hits[p.id],andel:Math.round(hits[p.id]/n*100)})).sort((a,b)=>b.antall-a.antall);
 const feil=Object.values(hits).reduce((a,b)=>a+b,0),mestring=Math.round(Math.max(0,1-feil/n)*100);
 let h=`<div class="term"><h3>Innsikt — ${code}</h3><div class="tm">${n} anonyme svar · estimert mestring <b>${mestring}%</b></div>`;
 if(!funn.length)h+=`<div class="vurd">Ingen tydelig misforståelse.</div></div>`;
 else{for(const f of funn)h+=`<div class="mis"><span class="pct">${f.andel}%</span> (${f.antall}/${n}) — ${f.beskrivelse}<div class="tiltak">↳ ${f.tiltak}</div></div>`;
  const t=funn[0];h+=`<div class="note"><b>Forslag (lærer godkjenner):</b> Klassen ligger ~1 uke bak på <b>${code}</b> pga "${t.id}". Sett av en målrettet øvingsøkt; nedstrøms mål forskyves.</div></div>`;
  h+=resept(code,funn);}
 document.getElementById('loopOut').innerHTML=h;}
/* resept: hvilke OPPGAVETYPER laereren skal se etter (genererer ikke oppgaver) */
function ndlaFor(fag,strand){return ((NDLA.bridge[fag]||{})[strand])||[];}
function topicCard(t,grunn){let h=`<div class="rtopic"><div class="rt-head"><b>${t.emne}</b><span class="rt-cnt">${t.antall} oppgaver</span></div><div class="rt-why">${grunn}</div>`;
 if(t.eksempler&&t.eksempler.length){h+=`<div class="rt-links">`;t.eksempler.forEach(e=>h+=`<a href="${e.url}" target="_blank" rel="noopener">${e.title} ↗</a>`);h+=`</div>`;}
 return h+`</div>`;}
function resept(code,funn){const s=DB.subjects[CUR];const node=s.nodes[code]||{};const strand=node.strand||"";
 let h=`<div class="resept"><div class="rhdr">📚 Se etter disse oppgavetypene</div><div class="rsub">Produktet lager ikke oppgaver. Finn oppgaver av disse typene i din egen fagbok — eller bruk de åpne NDLA-lenkene (gratis).</div>`;
 // hovedtema for dette maalet
 const seen=new Set();const onLevel=ndlaFor(s.fag,strand);
 onLevel.forEach(t=>{if(seen.has(t.emne))return;seen.add(t.emne);h+=topicCard(t,"Hovedtema for dette kompetansemålet");});
 // forkunnskap (paa tvers av fag) hvis klassen strever
 const pre=node.krever||[];const preCards=[];
 pre.forEach(pk=>{const nm=NDLA.nodemap[pk];if(!nm)return;ndlaFor(nm.fag,nm.strand).forEach(t=>{const key=nm.fag+"|"+t.emne;if(seen.has(t.emne)||preCards.find(x=>x.key===key))return;preCards.push({key,html:topicCard(t,`Forkunnskap (${nm.fag.replace('Matematikk ','')}) — hvis elevene strever med grunnlaget`)});});});
 if(preCards.length){h+=`<div class="rgroup">Hvis grunnlaget mangler — gå tilbake til:</div>`;preCards.forEach(c=>h+=c.html);}
 return h+`</div>`;}
/* chat: generisk graf-raadgiver */
function findCodes(s,t){const set=new Set();for(const w in s.kw){if(t.includes(w))s.kw[w].forEach(c=>set.add(c));}return[...set];}
function gtext(s,c){return ((s.goals.find(g=>g.kode===c)||{}).tekst||c).slice(0,42)+"...";}
function revDeps(s,c){return s.seq.filter(x=>(s.nodes[x].krever||[]).includes(c));}
function fillChatEx(){const s=DB.subjects[CUR];// foreslaa eksempler fra grafen
 const withReq=s.seq.find(c=>(s.nodes[c].krever||[]).length);const w=Object.keys(s.kw)[0];
 let ex=[];if(withReq){const req=s.nodes[withReq].krever[0];ex.push(`Kan jeg ta ${kwForCode(s,withReq)} foer ${kwForCode(s,req)}?`);}
 ex.push(`Vi ligger bak paa ${kwForCode(s,s.seq[0])}`);ex.push(`Mer tid paa ${kwForCode(s,s.seq[Math.min(1,s.seq.length-1)])}`);
 document.getElementById('chatEx').innerHTML="Prøv: "+ex.map(e=>`<b onclick="ex(this)">${e}</b>`).join(" · ");}
function kwForCode(s,c){for(const w in s.kw){if(s.kw[w].includes(c)&&w.length>=6)return w;}return c;}
function advise(txt){const s=DB.subjects[CUR];const t=txt.toLowerCase();const gs=findCodes(s,t);
 const earlier=/(tidlig|foer|forst|fremover)/.test(t),later=/(senere|etter|sist|bak|slutt)/.test(t),behind=/(ligger bak|sliter|henger|bak paa)/.test(t),more=/(mer tid|legg til|flere uker|lengre|ekstra)/.test(t);
 if(!gs.length)return{cls:"",vd:"Hmm",b:"Hvilket tema mener du? Nevn et stikkord fra et kompetansemål i dette faget."};
 if(behind){const g=gs[0];return{cls:"ok",vd:"Lurt — målrettet øving",b:`Du ligger bak på <b>${g}</b> (${gtext(s,g)}). Sett av en kort øvingsøkt på det elevene bommer på, og skyv nedstrøms én uke. I «Lukket sløyfe» foreslår jeg hvilke oppgavetyper du bør se etter i fagboka (med åpne NDLA-lenker).`};}
 if(more){const g=gs[0],rev=revDeps(s,g);return{cls:"ok",vd:"Greit",b:`Mer tid på <b>${g}</b> er uproblematisk.${rev.length?` Merk: ${rev.join(", ")} bygger på dette og forskyves.`:""} Du bestemmer.`};}
 if(earlier&&!later){for(const g of gs){const req=s.nodes[g].krever||[];if(req.length)return{cls:"stop",vd:"Pass på — bryter en forutsetning",b:`<b>${g}</b> (${gtext(s,g)}) bygger på ${req.join(", ")}. Tar du det tidligere, mangler elevene grunnlaget. Behold rekkefølgen, eller flytt forutsetningene foran. Du bestemmer.`};}return{cls:"warn",vd:"Mulig, men sjekk",b:`<b>${gs[0]}</b> har ingen forutsetninger i faget. Pass på at temaer som bygger på det (${revDeps(s,gs[0]).join(", ")||"ingen"}) fortsatt kommer etter.`};}
 if(later){for(const g of gs){const rev=revDeps(s,g);if(rev.length)return{cls:"warn",vd:"Mulig, men noe må flyttes med",b:`<b>${g}</b> er forutsetning for ${rev.join(", ")}. Flyttes det senere, må de også flyttes bakover.`};}return{cls:"ok",vd:"Greit",b:`<b>${gs[0]}</b> er ikke forutsetning for andre mål, så det kan trygt flyttes senere.`};}
 return{cls:"",vd:"Si litt mer",b:`Vil du flytte <b>${gs[0]}</b>, bruke mer tid, eller melde at klassen ligger bak?`};}
function push(h){const l=document.getElementById('chatlog');l.innerHTML+=h;l.scrollTop=l.scrollHeight;}
/* Per: bruk backend (/chat) naar demoen serveres fra serveren; ellers offline-raadgiver */
const API=((location.protocol==='http:'||location.protocol==='https:')&&!location.host.includes('github.io'))?location.origin:null;
let CHAT=[];
function esc(s){return (s||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));}
function fmt(s){return esc(s).replace(/\*\*(.+?)\*\*/g,'<b>$1</b>').replace(/\n/g,'<br>');}
function autoGrow(i){i.style.height='auto';i.style.height=Math.min(i.scrollHeight,140)+'px';}
function onComposerInput(){const i=document.getElementById('chatin');autoGrow(i);document.getElementById('ctSend').classList.toggle('on',!!i.value.trim());}
function composerKey(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendChat();}}
async function sendChat(){const i=document.getElementById('chatin');const v=i.value.trim();if(!v)return;
 push(`<div class="msg me">${esc(v)}</div>`);i.value="";autoGrow(i);document.getElementById('ctSend').classList.remove('on');
 if(API){const id='t'+Date.now();push(`<div class="msg ai" id="${id}"><div class="typing"><span></span><span></span><span></span></div></div>`);
  try{const r=await fetch(API+'/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({message:v,subject:CUR,history:CHAT})});
   const d=await r.json();const el=document.getElementById(id);
   if(el)el.outerHTML=`<div class="msg ai">${fmt(d.reply)}</div>`;
   CHAT.push({role:'user',content:v});CHAT.push({role:'assistant',content:d.reply||''});if(CHAT.length>12)CHAT=CHAT.slice(-12);
   const l=document.getElementById('chatlog');l.scrollTop=l.scrollHeight;
  }catch(e){const el=document.getElementById(id);const a=advise(v);if(el)el.outerHTML=`<div class="msg ai ${a.cls}"><div class="vd">${a.vd}</div>${a.b}</div>`;}
  return;}
 const a=advise(v);push(`<div class="msg ai ${a.cls}"><div class="vd">${a.vd}</div>${a.b}</div>`);}
function ex(el){const i=document.getElementById('chatin');i.value=el.textContent;onComposerInput();sendChat();}
function toggleAsst(){document.getElementById('assistant').classList.toggle('collapsed');}
renderMenu();
